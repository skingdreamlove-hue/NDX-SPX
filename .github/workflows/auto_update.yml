name: 自动更新美股数据

on:
  schedule:
    # 美股盘中: 周一至周五, ET 9:30~16:00 = UTC 13:30~20:00
    # 每 2 小时一次: 14:30, 16:30, 18:30 UTC (对应 ET 10:30, 12:30, 14:30)
    - cron: '30 14,16,18 * * 1-5'
    # 盘后再更新一次: 21:30 UTC (ET 17:30, 收盘后)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      - name: 抓取数据并计算情绪
        run: python gh_auto_update.py

      - name: 提交更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: 更新市场数据'
          file_pattern: 'market_data.js market_data.json docs/market_data.js docs/data/latest.json docs/data/real_fund_data.json'
