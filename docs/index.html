<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0e17;
  --bg-card:#131824;
  --bg-card-hover:#1a2032;
  --text-primary:#e8eaed;
  --text-secondary:#9aa0a6;
  --text-muted:#5f6368;
  --border-card:#1e2a3a;
  --green:#34a853;
  --green-bg:rgba(52,168,83,0.12);
  --green-border:rgba(52,168,83,0.3);
  --red:#ea4335;
  --red-bg:rgba(234,67,53,0.12);
  --red-border:rgba(234,67,53,0.3);
  --orange:#f9ab00;
  --orange-bg:rgba(249,171,0,0.12);
  --orange-border:rgba(249,171,0,0.3);
  --yellow:#fbbc04;
  --blue:#4285f4;
  --blue-bg:rgba(66,133,244,0.12);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-height:56px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(var(--tab-height) + 8px + var(--safe-bottom));
}
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg-primary);
  padding:12px 16px;
  border-bottom:1px solid var(--border-card);
  display:flex;align-items:center;justify-content:space-between;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.3px}
.header-right{display:flex;align-items:center;gap:10px}
.header-update{font-size:11px;color:var(--text-muted)}
.btn-refresh{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border-card);background:var(--bg-card);
  color:var(--text-secondary);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.btn-refresh:active{background:var(--bg-card-hover);transform:scale(.95)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{
  padding:6px 16px;font-size:10px;color:var(--text-muted);
  display:flex;align-items:center;gap:6px
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted)}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.stale{background:var(--orange)}
.container{padding:8px 12px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:14px;padding:16px;margin-bottom:10px
}
.signal-hero{text-align:center;padding:20px 16px 16px;border-width:2px}
.signal-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.signal-emotion{font-size:32px;font-weight:800;margin-bottom:4px}
.signal-strength{font-size:13px;margin-bottom:10px}
.signal-fear{color:var(--green);border-color:var(--green-border)}
.signal-fear .card,.signal-fear.signal-hero{background:var(--green-bg)}
.signal-greed{color:var(--red);border-color:var(--red-border)}
.signal-greed .card,.signal-greed.signal-hero{background:var(--red-bg)}
.signal-neutral{color:var(--yellow);border-color:var(--orange-border)}
.signal-neutral .card,.signal-neutral.signal-hero{background:var(--orange-bg)}
.position-row{display:flex;gap:12px;flex-wrap:wrap}
.position-item{flex:1;min-width:0;text-align:center}
.position-val{font-size:22px;font-weight:700;margin-bottom:2px}
.position-label{font-size:11px;color:var(--text-muted)}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-item{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:12px
}
.metric-name{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.metric-val{font-size:17px;font-weight:600}
.metric-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.index-compare{display:flex;gap:12px}
.index-block{flex:1;text-align:center}
.index-name{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.index-price{font-size:18px;font-weight:700}
.index-dev{font-size:11px;margin-top:3px}
.recent-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border-card)
}
.recent-item:last-child{border-bottom:none}
.recent-date{font-size:11px;color:var(--text-muted);width:80px}
.recent-emotion{font-size:12px;font-weight:600;width:58px}
.recent-position{font-size:12px;color:var(--text-secondary);width:50px;text-align:center}
.recent-action{font-size:11px;color:var(--text-muted);text-align:right}
.tag{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:600
}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-yellow{background:var(--orange-bg);color:var(--orange)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none
}
.toast.show{opacity:1}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px}
.error-box{text-align:center;padding:24px 16px}
.error-box .msg{color:var(--red);font-size:14px;margin-bottom:12px}
.error-box button{
  background:var(--bg-card);border:1px solid var(--border-card);
  color:var(--text-primary);padding:8px 24px;border-radius:20px;font-size:13px;cursor:pointer
}
.up{color:var(--green)}.down{color:var(--red)}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg-card);border-top:1px solid var(--border-card);
  display:flex;padding-bottom:var(--safe-bottom)
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 4px;border:none;background:none;color:var(--text-muted);
  font-size:10px;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent
}
.tab-btn.active{color:var(--blue)}
.tab-btn svg{width:20px;height:20px;margin-bottom:2px}

.fund-group-title{
  font-size:13px;font-weight:700;color:var(--text-secondary);
  padding:6px 0;margin-bottom:6px
}
.fund-group-count{
  font-size:11px;color:var(--text-muted);font-weight:400;margin-left:4px
}
.fund-card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:12px;margin-bottom:6px
}
.fund-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.fund-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;min-width:0;padding-right:8px}
.fund-code{font-size:10px;color:var(--text-muted);font-family:monospace}
.fund-badge{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;
  font-weight:600;white-space:nowrap;flex-shrink:0
}
.fund-badge-danger{background:rgba(234,67,53,0.15);color:#ef4444}
.fund-badge-warn{background:rgba(249,171,0,0.15);color:#f59e0b}
.fund-badge-ok{background:rgba(16,185,129,0.15);color:#10b981}
.fund-badge-info{background:var(--blue-bg);color:var(--blue)}
.fund-card-meta{display:flex;gap:12px;font-size:11px;color:var(--text-secondary)}
.fund-meta-item{display:flex;flex-direction:column}
.fund-meta-label{color:var(--text-muted);font-size:9px}
.purchase-limit{font-size:12px;font-weight:600;color:var(--text-primary);margin-top:4px;padding-top:4px;border-top:1px solid var(--border-card)}
.fund-summary{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:10px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;font-size:12px
}
.fund-summary-val{font-weight:700;color:var(--blue)}
.fund-update-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:4px}
.btn-fund-update{
  background:var(--blue-bg);border:1px solid rgba(66,133,244,0.3);
  color:var(--blue);padding:6px 16px;border-radius:16px;font-size:12px;
  cursor:pointer;font-weight:600;transition:all .2s
}
.btn-fund-update:active{transform:scale(.95);opacity:.8}
.btn-fund-update:disabled{opacity:.5;cursor:not-allowed}
.fund-progress{width:100%;height:3px;background:var(--border-card);border-radius:2px;margin-top:6px;overflow:hidden;display:none}
.fund-progress.active{display:block}
.fund-progress-bar{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0}
.fund-source-tag{font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
.fund-source-api{background:rgba(52,168,83,0.15);color:#34a853}
.fund-source-local{background:rgba(249,171,0,0.15);color:#f9ab00}
.fund-update-btns{display:flex;gap:6px}
.btn-status-update{background:rgba(249,171,0,0.12)!important;border-color:rgba(249,171,0,0.3)!important;color:#f9ab00!important}
.gha-badge{font-size:10px;padding:2px 7px;border-radius:9999px;font-weight:600;background:rgba(107,114,128,0.15);color:var(--text-muted);white-space:nowrap}
.gha-badge.active{background:rgba(52,168,83,0.15);color:#34a853}
.token-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px}
.token-box{background:var(--bg-card);border:1px solid var(--border-card);border-radius:16px;padding:24px;width:100%;max-width:360px}
.token-box h3{font-size:16px;margin-bottom:12px;color:var(--text-primary)}
.token-box label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:4px}
.token-box input{width:100%;padding:10px;border:1px solid var(--border-card);border-radius:8px;font-size:13px;background:var(--bg-primary);color:var(--text-primary);outline:none;margin-bottom:12px}
.token-box input:focus{border-color:#3B82F6}
.token-box .btn-row{display:flex;gap:8px}
.token-box .btn-row button{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.token-box .btn-save{background:#34a853;color:#fff}
.token-box .btn-del{background:rgba(234,67,53,0.15);color:#ea4335}
.token-box .btn-close2{background:rgba(107,114,128,0.15);color:var(--text-secondary)}</style>
</head>

function $id(id){return document.getElementById(id)}
function showToast(msg){
  var t=$id('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(function(){t.classList.remove('show')},2000)
}

function getSentimentClass(level){
  if(!level) return 'signal-neutral';
  if(level.indexOf('恐慌')>=0) return 'signal-fear';
  if(level.indexOf('贪婪')>=0) return 'signal-greed';
  return 'signal-neutral'
}
function getEmotionColorClass(level){
  if(!level) return 'tag-yellow';
  if(level.indexOf('恐慌')>=0) return 'tag-green';
  if(level.indexOf('贪婪')>=0) return 'tag-red';
  return 'tag-yellow'
}
function fmtPct(v){
  if(v==null||v===undefined) return '---';
  var n=Number(v),c=n>=0?'up':'down';
  return '<span class="'+c+'">'+(n>=0?'+':'')+n.toFixed(2)+'%</span>'
}
function fmtNum(v,d){
  if(v==null||v===undefined) return '---';
  return Number(v).toFixed(d||0)
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(function(el){el.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active')});
  $id('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  $id('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  $id('headerTitle').textContent = tab==='restriction' ? '限购查询' : '美股情绪监测';
  if(tab==='restriction' && fundData.length===0){loadFundData()}
}

function setStatus(live,text){

  dot.className='status-dot '+(live?'live':'');
  txt.textContent=text||''
}

function fetchJSON(url,timeout){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},timeout||fetchTimeout);
  return fetch(url,{signal:ctrl.signal,cache:'no-cache'})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .catch(function(e){clearTimeout(tid);throw e})
}

function fetchYF(symbol){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},fetchTimeout);
  var url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval=1d&range=5d';
  return fetch(url,{signal:ctrl.signal})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .then(function(d){
      var meta=d.chart.result[0].meta;
      var quote=d.chart.result[0].indicators.quote[0];
      var n=quote.close.length;
      return {symbol:symbol,price:quote.close[n-1],prevClose:meta.chartPreviousClose,high:meta.regularMarketDayHigh,low:meta.regularMarketDayLow}
    })
    .catch(function(e){clearTimeout(tid);return null})
}

    function cleanup(){clearTimeout(tid);window.jsonpgz=null;if(script.parentNode)script.parentNode.removeChild(script)}
    window.jsonpgz=function(data){cleanup();resolve(data)};
    script.src='https://fundgz.1234567.com.cn/js/'+code+'.js?rt='+Date.now();

  })

function updateFundDataFromAPI(){
  if(fundApiUpdating) return;
  fundApiUpdating=true;
  var codes=Object.keys(FUND_INFO);
  var total=codes.length;
  var done=0;
  var ok=0;
  var apiResults={};
  var progressBar=$id('fundProgressBar');
  var progressWrap=$id('fundProgress');
  var btnUpdate=$id('btnFundUpdate');
  if(progressWrap)progressWrap.classList.add('active');
  if(btnUpdate)btnUpdate.disabled=true;
  function updateProgress(){
    var pct=Math.round(done/total*100);
    if(progressBar)progressBar.style.width=pct+'%';
    if(btnUpdate)btnUpdate.textContent=done+'/'+total
  }
  function next(){
    if(done>=total){
      fundApiUpdating=false;
      fundApiTime=new Date();
      if(btnUpdate){btnUpdate.disabled=false;btnUpdate.textContent='在线更新'}
      if(progressWrap)progressWrap.classList.remove('active');
      if(progressBar)progressBar.style.width='0';
      mergeApiData(apiResults,ok);
      showToast('已更新 '+ok+'/'+total+' 只基金实时数据');
      return
    }
    var code=codes[done];
    fetchFundRealtime(code).then(function(data){
      apiResults[data.fundcode]=data;
      ok++;
      done++;
      updateProgress();
      next()
    }).catch(function(){
      done++;
      updateProgress();
      next()
    })
  }
  updateProgress();
  next()
}

function updateTradeStatus(){
  if(fundStatusUpdating||fundApiUpdating)return;
  if(!fundData||fundData.length===0){showToast('请先更新基金数据');return}
  fundStatusUpdating=true;
  var codes=fundData.map(function(f){return f['基金代码']});
  var progressBar=$id('fundProgressBar');
  var progressWrap=$id('fundProgress');
  var btnStatus=$id('btnStatusUpdate');
  if(progressWrap)progressWrap.classList.add('active');
  if(btnStatus){btnStatus.disabled=true;btnStatus.textContent='获取中...'}
  if(progressBar)progressBar.style.width='20%';

  var varName='_fundStatus_'+Date.now();
  var script=document.createElement('script');
  var done=false;
  var timeout=setTimeout(function(){
    if(done)return;done=true;
    cleanup();fundStatusUpdating=false;
    if(btnStatus){btnStatus.disabled=false;btnStatus.textContent='更新状态'}
    if(progressWrap)progressWrap.classList.remove('active');
    showToast('获取交易状态超时，请重试')
  },90000);
  function cleanup(){
    clearTimeout(timeout);
    try{delete window[varName]}catch(e){}
    if(script.parentNode)script.parentNode.removeChild(script)
  }
  script.onload=function(){
    if(done)return;done=true;
    var data=window[varName];
    cleanup();
    if(!data||!data.datas){fundStatusUpdating=false;if(btnStatus){btnStatus.disabled=false;btnStatus.textContent='更新状态'}if(progressWrap)progressWrap.classList.remove('active');showToast('获取交易状态失败');return}
    var ok=0;
    var codeSet={};
    for(var i=0;i<codes.length;i++){codeSet[codes[i]]=true}
    for(var j=0;j<data.datas.length;j++){
      var item=data.datas[j];
      var code=item[0];
      if(codeSet[code]){
        var sgzt=item[5]||'';
        var shzt=item[6]||'';
        var limitAmt=item[9]||'';
        var statusText=sgzt;
        if(shzt&&shzt!==sgzt)statusText+='，'+shzt;
        if(limitAmt&&limitAmt!=='0'&&limitAmt!=='100000000000'&&sgzt.indexOf('暂停')<0){
          var amt=parseFloat(limitAmt);
          if(amt>0){
            var amtStr=amt>=10000?(amt/10000)+'万':amt+'元';
            statusText+='(限'+amtStr+')'
          }
        }
        for(var k=0;k<fundData.length;k++){
          if(fundData[k]['基金代码']===code){
            fundData[k]['交易状态']=statusText;
            fundData[k]['申购状态']=sgzt;
            fundData[k]['赎回状态']=shzt;
            if(limitAmt&&limitAmt!=='0')fundData[k]['日累计限定金额']=limitAmt;
            ok++;break
          }
        }
      }
    }
    fundStatusUpdating=false;
    fundStatusTime=new Date();
    if(btnStatus){btnStatus.disabled=false;btnStatus.textContent='更新状态'}
    if(progressWrap)progressWrap.classList.remove('active');
    if(progressBar)progressBar.style.width='0';
    buildRestrictionUI();
    showToast('已更新 '+ok+'/'+codes.length+' 只基金交易状态')
  };
  script.src='https://fund.eastmoney.com/Data/Fund_JJJZ_Data.aspx?t=8&page=1,30000&px=z&sc=z&st=desc&sd=&ed=&js='+varName;
  script.onerror=function(){
    if(done)return;done=true;
    cleanup();fundStatusUpdating=false;
    if(btnStatus){btnStatus.disabled=false;btnStatus.textContent='更新状态'}
    if(progressWrap)progressWrap.classList.remove('active');
    showToast('获取交易状态失败，请检查网络')
  };
  document.head.appendChild(script)
}

      var f=fundData[i];

      if(api){
        f['最新净值']=api.dwjz;
        f['日涨跌幅']=api.gszzl+'%';
        f['净值日期']=api.gztime||api.jzrq;
        f._apiSource=true
      }
    }
  }else{
    var codes=Object.keys(FUND_INFO);
    fundData=[];
    for(var i=0;i<codes.length;i++){
      var code=codes[i];
      var info=FUND_INFO[code];
      var api=apiResults[code];
      fundData.push({
        "基金代码":code,
        "基金名称":info.name,
        "类型":info.type,
        "最新净值":api?api.dwjz:"N/A",
        "日涨跌幅":api?api.gszzl+"%":"N/A",
        "净值日期":api?(api.gztime||api.jzrq):"N/A",
        "交易状态":"N/A",
        "购买手续费":info.purchase,
        "管理费率":info.management,
        "托管费率":info.custody,
        "销售服务费":info.sales,
        "合计费率":info.total,
        "近1年":"N/A",
        "链接":"https://fund.eastmoney.com/"+code+".html",
        "分类":info.category,
        _apiSource:!!api
      })
    }
  }
  buildRestrictionUI()
}

function loadFundData(){
  fetchJSON(FUND_URL).then(function(data){
    fundData = data;
    buildRestrictionUI();
  }).catch(function(e){
    fundData=[];
    buildRestrictionUI();
  })
}

function parseLimit(txt){
  if(!txt||txt==='N/A'||txt==='-') return null;
  var m=txt.match(/([\d.]+)(万?)元/)
  if(m){var v=parseFloat(m[1]);if(m[2]==='万')v*=10000;return v}
  return null
}

function getFundBadge(statusText){
  if(!statusText||statusText==='N/A') return '<span class="fund-badge fund-badge-info">未知</span>';
  var limit=parseLimit(statusText);
  if(statusText.indexOf('暂停申购')>=0){
    var cls='fund-badge-danger',label='暂停申购';
    if(limit!=null){if(limit<100)cls='fund-badge-danger';else if(limit<1000)cls='fund-badge-warn';else cls='fund-badge-info'}
    var m=statusText.match(/\(单日累计购买上限([\d.]+(?:万)?元)\)/);
    if(m)label='限购 '+m[1]
    return '<span class="fund-badge '+cls+'">'+label+'</span>'
  }
  if(statusText.indexOf('正常')>=0||statusText.indexOf('开放')>=0) return '<span class="fund-badge fund-badge-ok">可申购</span>'
  return '<span class="fund-badge fund-badge-info">'+statusText+'</span>'
}

function parsePct(str){
  if(!str||str==='N/A'||str==='-') return 0;
  return parseFloat(str.replace('%',''))||0
}
function getNetReturn(f){
  return parsePct(f['近1年']) - parsePct(f['合计费率'])
}
function isBuyable(f){
  var s=f['交易状态']||'';
  return s.indexOf('暂停申购')<0&&s.indexOf('暂停赎回')<0
}

function calcBuyableAmount(list){
  var total=0;
  for(var i=0;i<list.length;i++){
    var s=list[i]['交易状态']||'';
    if(s.indexOf('暂停申购')>=0) continue;
    var m=s.match(/单日累计购买上限([\d.]+)(万?)元/);
    if(m){var v=parseFloat(m[1])||0;if(m[2]==='万')v*=10000;total+=v}
  }
  return total
}
function formatBuyableAmount(total){
  if(total>=10000) return (total/10000).toFixed(2)+'万元';
  return total.toFixed(0)+'元'
}

function buildRestrictionUI(){
  if(!fundData||fundData.length===0){
    var noDataHtml='<div class="fund-update-bar"><span style="font-size:12px;color:var(--text-muted)">无本地数据，点击右侧从API获取</span><div class="fund-update-btns"><button class="btn-fund-update" id="btnFundUpdate" onclick="updateFundDataFromAPI()">在线更新</button></div></div><div class="fund-progress" id="fundProgress"><div class="fund-progress-bar" id="fundProgressBar"></div></div>';
    $id('panelRestriction').innerHTML=noDataHtml+'<div class="error-box"><div class="msg">暂无基金数据</div><button onclick="updateFundDataFromAPI()">从API获取</button></div>';return
  }
  var nasdaq=[],sp500=[];
  for(var i=0;i<fundData.length;i++){
    var f=fundData[i];
    if(f['分类']==='nasdaq') nasdaq.push(f);
    else if(f['分类']==='sp500') sp500.push(f);
  }
  nasdaq.sort(function(a,b){return getNetReturn(b)-getNetReturn(a)});
  sp500.sort(function(a,b){return getNetReturn(b)-getNetReturn(a)});

  var apiCount=0;
  for(var i=0;i<fundData.length;i++){if(fundData[i]._apiSource)apiCount++}
  var sourceInfo=fundApiTime?'API更新于 '+fundApiTime.getHours()+':'+String(fundApiTime.getMinutes()).padStart(2,'0')+(apiCount>0?' ('+apiCount+'只实时)':''):'本地缓存数据';

  function renderGroup(title,list){
    var h='';
    var buyable=calcBuyableAmount(list);
    h+='<div class="fund-summary"><span>'+title+'</span><span>可买入：<span class="fund-summary-val">'+formatBuyableAmount(buyable)+'</span></span></div>';
    for(var i=0;i<list.length;i++){
      var f=list[i];
      var netRet=getNetReturn(f);
      var netRetStr=netRet.toFixed(2)+'%';
      var netRetCls=netRet>0?'up':'down';
      var retRaw=f['近1年']||'-';
      var limit=parseLimit(f['交易状态']);
      var sourceTag=f._apiSource?'<span class="fund-source-tag fund-source-api">实时</span>':'<span class="fund-source-tag fund-source-local">缓存</span>';
      h+='<div class="fund-card">'
        +'<div class="fund-card-top">'
          +'<div><div class="fund-name">'+f['基金名称']+sourceTag+'</div><div class="fund-code">'+f['基金代码']+' · '+f['类型']+'类</div></div>'
          +getFundBadge(f['交易状态'])
        +'</div>'
        +'<div class="fund-card-meta">'
          +'<div class="fund-meta-item"><span class="fund-meta-label">近一年收益</span><span class="'+netRetCls+'" style="font-weight:700;font-size:13px">'+netRetStr+'</span></div>'
          +'<div class="fund-meta-item"><span class="fund-meta-label">近1年(未扣费)</span><span>'+retRaw+'</span></div>'
          +'<div class="fund-meta-item"><span class="fund-meta-label">合计费率</span><span>'+(f['合计费率']||'-')+'</span></div>'
        +'</div>'
        +(limit!=null&&limit>0?'<div class="purchase-limit">每日上限: <strong>'+limit.toLocaleString()+'元</strong></div>':'')
      +'</div>';
    }
    return h
  }
  var statusInfo=fundStatusTime?'状态 '+fundStatusTime.getHours()+':'+String(fundStatusTime.getMinutes()).padStart(2,'0'):'';
  var html=''
    +'<div class="fund-update-bar"><span style="font-size:11px;color:var(--text-muted)">'+sourceInfo+(statusInfo?' | '+statusInfo:'')+'</span><div class="fund-update-btns"><button class="btn-fund-update" id="btnFundUpdate" onclick="updateFundDataFromAPI()">在线更新</button><button class="btn-fund-update btn-status-update" id="btnStatusUpdate" onclick="updateTradeStatus()">更新状态</button></div></div>'
    +'<div class="fund-progress" id="fundProgress"><div class="fund-progress-bar" id="fundProgressBar"></div></div>'
    +'<div class="fund-group-title">纳斯达克100<span class="fund-group-count">'+nasdaq.length+'只基金</span></div>'
    +renderGroup('纳斯达克100',nasdaq)
    +'<div class="fund-group-title" style="margin-top:16px">标普500<span class="fund-group-count">'+sp500.length+'只基金</span></div>'
    +renderGroup('标普500',sp500);
  $id('panelRestriction').innerHTML=html
}

function showToast(msg){var el=$id('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show')},3000)}
function openTokenDialog(){var d=$id('tokenOverlay');d.style.display='flex';$id('tokenInput').value=GH_TOKEN}
function closeTokenDialog(){$id('tokenOverlay').style.display='none'}
function saveToken(){var v=$id('tokenInput').value.trim();if(!v)return;setToken(v);closeTokenDialog();showToast('Token 已保存')}
function deleteToken(){clearToken();closeTokenDialog();showToast('Token 已清除')}
function triggerGHAUpdate(){
  if(!GH_TOKEN){showToast('请先设置 Token');openTokenDialog();return}
  if($id('btnRefresh').classList.contains('spinning'))return;
  var btn=$id('btnRefresh');btn.classList.add('spinning');
  showToast('正在触发 GitHub Actions...');
  triggerGHA().then(function(r){if(r.status===401||r.status===403)throw Error('Token 无效，请重新设置');if(!r.ok&&r.status!==204)throw Error('HTTP '+r.status+' 触发失败');showToast('GHA 已触发，等待完成...');return waitForGHA()})
  .then(function(){showToast('更新完成');return refreshAll()})
  .catch(function(e){showToast(e.message);console.error(e)})
    .finally(function(){btn.classList.remove('spinning')})
}

function smartUpdate(){
  if(GH_TOKEN){triggerGHAUpdate();return}
  refreshAll()
}

function refreshAll(){
  var btn=$id('btnRefresh');btn.classList.add('spinning')
  var p = GH_TOKEN ? fetchRawFile('docs/data/latest.json').then(function(d){if(d&&d.last_update){currentData=d;$id('updateTime').textContent=d.last_update.slice(5,16)}setStatus(false,'实时数据: '+(d.last_update||'未知'))}).catch(function(){return loadStaticData()}) : loadStaticData();
  p.then(function(){return loadLiveData()}).then(function(){buildSentimentUI()})
    .catch(function(e){console.error(e);if(!currentData){$id('panelSentiment').innerHTML='<div class="error-box"><div class="msg">数据加载失败</div><button onclick="refreshAll()">重试</button></div>'}else{buildSentimentUI()}})
    .finally(function(){
      btn.classList.remove('spinning');
      var now=new Date();
      var mm=String(now.getMonth()+1).padStart(2,'0');
      var dd=String(now.getDate()).padStart(2,'0');
      var hh=String(now.getHours()).padStart(2,'0');
      var mi=String(now.getMinutes()).padStart(2,'0');
      $id('updateTime').textContent=mm+'-'+dd+' '+hh+':'+mi
    })
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

document.addEventListener('DOMContentLoaded',function(){
  refreshAll();
  setInterval(refreshAll,5*60*1000);
})
</script>
