<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<meta name="apple-mobile-web-app-title" content="美股情绪">
<link rel="manifest" href="manifest.json">
<title>美股情绪监测</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0e17;
  --bg-card:#131824;
  --bg-card-hover:#1a2032;
  --text-primary:#e8eaed;
  --text-secondary:#9aa0a6;
  --text-muted:#5f6368;
  --border-card:#1e2a3a;
  --green:#34a853;
  --green-bg:rgba(52,168,83,0.12);
  --green-border:rgba(52,168,83,0.3);
  --red:#ea4335;
  --red-bg:rgba(234,67,53,0.12);
  --red-border:rgba(234,67,53,0.3);
  --orange:#f9ab00;
  --orange-bg:rgba(249,171,0,0.12);
  --orange-border:rgba(249,171,0,0.3);
  --yellow:#fbbc04;
  --blue:#4285f4;
  --blue-bg:rgba(66,133,244,0.12);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-height:56px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(var(--tab-height) + 8px + var(--safe-bottom));
}
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg-primary);
  padding:12px 16px;
  border-bottom:1px solid var(--border-card);
  display:flex;align-items:center;justify-content:space-between;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.3px}
.header-right{display:flex;align-items:center;gap:10px}
.header-update{font-size:11px;color:var(--text-muted)}
.btn-refresh{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border-card);background:var(--bg-card);
  color:var(--text-secondary);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.btn-refresh:active{background:var(--bg-card-hover);transform:scale(.95)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{
  padding:6px 16px;font-size:10px;color:var(--text-muted);
  display:flex;align-items:center;gap:6px
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted)}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.stale{background:var(--orange)}
.container{padding:8px 12px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:14px;padding:16px;margin-bottom:10px
}
.signal-hero{text-align:center;padding:20px 16px 16px;border-width:2px}
.signal-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.signal-emotion{font-size:32px;font-weight:800;margin-bottom:4px}
.signal-strength{font-size:13px;margin-bottom:10px}
.signal-fear{color:var(--green);border-color:var(--green-border)}
.signal-fear .card,.signal-fear.signal-hero{background:var(--green-bg)}
.signal-greed{color:var(--red);border-color:var(--red-border)}
.signal-greed .card,.signal-greed.signal-hero{background:var(--red-bg)}
.signal-neutral{color:var(--yellow);border-color:var(--orange-border)}
.signal-neutral .card,.signal-neutral.signal-hero{background:var(--orange-bg)}
.position-row{display:flex;gap:12px;flex-wrap:wrap}
.position-item{flex:1;min-width:0;text-align:center}
.position-val{font-size:22px;font-weight:700;margin-bottom:2px}
.position-label{font-size:11px;color:var(--text-muted)}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-item{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:12px
}
.metric-name{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.metric-val{font-size:17px;font-weight:600}
.metric-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.index-compare{display:flex;gap:12px}
.index-block{flex:1;text-align:center}
.index-name{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.index-price{font-size:18px;font-weight:700}
.index-dev{font-size:11px;margin-top:3px}
.recent-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border-card)
}
.recent-item:last-child{border-bottom:none}
.recent-date{font-size:11px;color:var(--text-muted);width:80px}
.recent-emotion{font-size:12px;font-weight:600;width:58px}
.recent-position{font-size:12px;color:var(--text-secondary);width:50px;text-align:center}
.recent-action{font-size:11px;color:var(--text-muted);text-align:right}
.tag{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:600
}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-yellow{background:var(--orange-bg);color:var(--orange)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none
}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px}
.error-box{text-align:center;padding:24px 16px}
.error-box .msg{color:var(--red);font-size:14px;margin-bottom:12px}
.error-box button{
  background:var(--bg-card);border:1px solid var(--border-card);
  color:var(--text-primary);padding:8px 24px;border-radius:20px;font-size:13px;cursor:pointer
}
.up{color:var(--green)}.down{color:var(--red)}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg-card);border-top:1px solid var(--border-card);
  display:flex;padding-bottom:var(--safe-bottom)
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 4px;border:none;background:none;color:var(--text-muted);
  font-size:10px;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent
}
.tab-btn.active{color:var(--blue)}
.tab-btn svg{width:20px;height:20px;margin-bottom:2px}

.fund-group-title{
  font-size:13px;font-weight:700;color:var(--text-secondary);
  padding:6px 0;margin-bottom:6px
}
.fund-group-count{
  font-size:11px;color:var(--text-muted);font-weight:400;margin-left:4px
}
.fund-card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:12px;margin-bottom:6px
}
.fund-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.fund-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;min-width:0;padding-right:8px}
.fund-code{font-size:10px;color:var(--text-muted);font-family:monospace}
.fund-badge{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;
  font-weight:600;white-space:nowrap;flex-shrink:0
}
.fund-badge-danger{background:rgba(234,67,53,0.15);color:#ef4444}
.fund-badge-warn{background:rgba(249,171,0,0.15);color:#f59e0b}
.fund-badge-ok{background:rgba(16,185,129,0.15);color:#10b981}
.fund-badge-info{background:var(--blue-bg);color:var(--blue)}
.fund-card-meta{display:flex;gap:12px;font-size:11px;color:var(--text-secondary)}
.fund-meta-item{display:flex;flex-direction:column}
.fund-meta-label{color:var(--text-muted);font-size:9px}
.purchase-limit{font-size:12px;font-weight:600;color:var(--text-primary);margin-top:4px;padding-top:4px;border-top:1px solid var(--border-card)}
.fund-summary{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:10px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;font-size:12px
}
.fund-summary-val{font-weight:700;color:var(--blue)}
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="headerTitle">美股情绪监测</div>
  <div class="header-right">
    <span class="header-update" id="updateTime">加载中...</span>
    <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()" aria-label="刷新">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="status-bar" id="statusBar"><span class="status-dot" id="statusDot"></span><span id="statusText">加载中...</span></div>

<div class="container">
  <div class="tab-panel active" id="panelSentiment"><div class="loading">加载中，请稍候...</div></div>
  <div class="tab-panel" id="panelRestriction"><div class="loading">加载中，请稍候...</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tabSentiment" onclick="switchTab('sentiment')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    情绪监测
  </button>
  <button class="tab-btn" id="tabRestriction" onclick="switchTab('restriction')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    限购查询
  </button>
</div>

<script>
var DATA_URL = 'data/latest.json';
var FUND_URL = 'data/real_fund_data.json';
var currentData = null;
var fundData = [];
var yfData = {};
var fetchTimeout = 12000;
var currentTab = 'sentiment';

function $id(id){return document.getElementById(id)}
function showToast(msg){
  var t=$id('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(function(){t.classList.remove('show')},2000)
}

function getSentimentClass(level){
  if(!level) return 'signal-neutral';
  if(level.indexOf('恐慌')>=0) return 'signal-fear';
  if(level.indexOf('贪婪')>=0) return 'signal-greed';
  return 'signal-neutral'
}
function getEmotionColorClass(level){
  if(!level) return 'tag-yellow';
  if(level.indexOf('恐慌')>=0) return 'tag-green';
  if(level.indexOf('贪婪')>=0) return 'tag-red';
  return 'tag-yellow'
}
function fmtPct(v){
  if(v==null||v===undefined) return '---';
  var n=Number(v),c=n>=0?'up':'down';
  return '<span class="'+c+'">'+(n>=0?'+':'')+n.toFixed(2)+'%</span>'
}
function fmtNum(v,d){
  if(v==null||v===undefined) return '---';
  return Number(v).toFixed(d||0)
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(function(el){el.classList.remove('active')});
  document.querySelectorAll('.tab-btn').forEach(function(el){el.classList.remove('active')});
  $id('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  $id('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  $id('headerTitle').textContent = tab==='restriction' ? '限购查询' : '美股情绪监测';
  if(tab==='restriction' && fundData.length===0){loadFundData()}
}

function setStatus(live,text){
  var dot=$id('statusDot'),txt=$id('statusText');
  dot.className='status-dot '+(live?'live':'');
  txt.textContent=text||''
}

function fetchJSON(url,timeout){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},timeout||fetchTimeout);
  return fetch(url,{signal:ctrl.signal,cache:'no-cache'})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .catch(function(e){clearTimeout(tid);throw e})
}

function fetchYF(symbol){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},fetchTimeout);
  var url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval=1d&range=5d';
  return fetch(url,{signal:ctrl.signal})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .then(function(d){
      var meta=d.chart.result[0].meta;
      var quote=d.chart.result[0].indicators.quote[0];
      var n=quote.close.length;
      return {symbol:symbol,price:quote.close[n-1],prevClose:meta.chartPreviousClose,high:meta.regularMarketDayHigh,low:meta.regularMarketDayLow}
    })
    .catch(function(e){clearTimeout(tid);return null})
}

function loadStaticData(){
  return fetchJSON(DATA_URL).then(function(d){
    currentData=d;
    if(d.last_update){$id('updateTime').textContent=d.last_update.slice(5,16)}
    setStatus(false,'桌面端数据: '+(d.last_update||'未知'))
    return d
  }).catch(function(e){setStatus(false,'无法加载数据');throw e})
}

function loadLiveData(){
  setStatus(false,'获取实时数据...')
  return Promise.all([fetchYF('^VIX'),fetchYF('^VIX3M'),fetchYF('QQQ'),fetchYF('SPY'),fetchYF('^TNX')])
    .then(function(r){
      yfData.vix=r[0];yfData.vix3m=r[1];yfData.qqq=r[2];yfData.spy=r[3];yfData.tnx=r[4]
      var c=(r[0]?1:0)+(r[1]?1:0)+(r[2]?1:0)+(r[3]?1:0)+(r[4]?1:0)
      setStatus(c>=3,c+'/'+5+' 项实时数据可用')
    })
}

function buildSentimentUI(){
  if(!currentData){
    $id('panelSentiment').innerHTML='<div class="error-box"><div class="msg">数据加载失败</div><button onclick="refreshAll()">重试</button></div>';return
  }
  var d=currentData,s=d.sentiment||{},p=d.position||{},ix=d.indices||{},ind=d.indicators||{},sCls=getSentimentClass(s.level),emoCls=getEmotionColorClass(s.level);
  var vix=ind.vix!=null?ind.vix.toFixed(2):'---';
  var vixLive=yfData.vix&&yfData.vix.price!=null?yfData.vix.price.toFixed(2):null;
  var vixDisp=vixLive||vix;
  var vixChange=vixLive&&ind.vix?((yfData.vix.price-ind.vix)/ind.vix*100).toFixed(1):null;
  var ndxPriceLive=yfData.qqq&&yfData.qqq.price!=null?yfData.qqq.price.toFixed(0):null;
  var spxPriceLive=yfData.spy&&yfData.spy.price!=null?yfData.spy.price.toFixed(0):null;
  var rec=d.recent_signals||[],eventsHtml='';
  for(var i=rec.length-1;i>=0;i--){
    var ev=rec[i],eCls=getEmotionColorClass(ev.emotion);
    eventsHtml+='<div class="recent-item"><span class="recent-date">'+ev.date.slice(-5)+'</span><span class="recent-emotion '+eCls+'">'+ev.emotion+'</span><span class="recent-position">'+ev.position+'</span><span class="recent-action">'+ev.action+'</span></div>'
  }
  var condTags='';
  if(s.conditions&&s.conditions.length){for(var ci=0;ci<s.conditions.length;ci++){condTags+='<span class="tag '+emoCls+'">'+s.conditions[ci]+'</span> '}}
  var html=''
  +'<div class="card signal-hero '+sCls+'"><div class="signal-label">当前情绪</div><div class="signal-emotion">'+s.level+'</div><div class="signal-strength">信号强度: '+s.strength+'</div>'+(condTags?'<div style="margin-top:8px">触发条件: '+condTags+'</div>':'')+'</div>'
  +'<div class="card"><div class="position-row">'
    +'<div class="position-item"><div class="position-label">目标仓位</div><div class="position-val">'+p.target+'%</div></div>'
    +'<div class="position-item"><div class="position-label">每日定投</div><div class="position-val">$'+p.daily_buy+'</div></div>'
    +'<div class="position-item"><div class="position-label">操作建议</div><div class="position-val" style="font-size:16px">'+p.advice+'</div></div>'
  +'</div></div>'
  +'<div class="card"><div class="index-compare">'
    +'<div class="index-block"><div class="index-name">纳斯达克100</div><div class="index-price">'+(ndxPriceLive||fmtNum(ix.nasdaq100,0))+'</div><div class="index-dev">MA200偏差 '+fmtPct(ix.nasdaq100_dev_ma200)+'</div><div class="index-dev">距高点 '+fmtPct(ix.nasdaq100_drawdown)+'</div></div>'
    +'<div class="index-block"><div class="index-name">标普500</div><div class="index-price">'+(spxPriceLive||fmtNum(ix.sp500,0))+'</div><div class="index-dev">MA200偏差 '+fmtPct(ix.sp500_dev_ma200)+'</div><div class="index-dev">距高点 '+fmtPct(ix.sp500_drawdown)+'</div></div>'
  +'</div></div>'
  +'<div class="metrics-grid">'
    +'<div class="metric-item"><div class="metric-name">VIX 恐慌指数</div><div class="metric-val">'+vixDisp+(vixChange&&Math.abs(vixChange)>=0.5?' <span style="font-size:11px;'+(vixChange>0?'color:var(--red)':'color:var(--green)')+'">'+(vixChange>0?'↑':'↓')+Math.abs(vixChange)+'%</span>':'')+'</div><div class="metric-sub">期限比: '+(ind.vix_term_ratio!=null?ind.vix_term_ratio.toFixed(2):'---')+'</div></div>'
    +'<div class="metric-item"><div class="metric-name">信用利差</div><div class="metric-val">'+(ind.credit_spread!=null?ind.credit_spread.toFixed(2)+'%':'---')+'</div><div class="metric-sub">高收益债利差</div></div>'
    +'<div class="metric-item"><div class="metric-name">Put/Call 比 QQQ</div><div class="metric-val">'+(ind.qqq_pcr!=null?ind.qqq_pcr.toFixed(2):'---')+'</div><div class="metric-sub">低位=乐观 高位=恐慌</div></div>'
    +'<div class="metric-item"><div class="metric-name">Put/Call 比 SPY</div><div class="metric-val">'+(ind.spy_pcr!=null?ind.spy_pcr.toFixed(2):'---')+'</div></div>'
    +'<div class="metric-item"><div class="metric-name">NDX高于200日线</div><div class="metric-val">'+(ind.ndx_breadth_200ma!=null?ind.ndx_breadth_200ma.toFixed(1)+'%':'---')+'</div></div>'
    +'<div class="metric-item"><div class="metric-name">SPX高于200日线</div><div class="metric-val">'+(ind.sp500_breadth_200ma!=null?ind.sp500_breadth_200ma.toFixed(1)+'%':'---')+'</div></div>'
    +'<div class="metric-item"><div class="metric-name">NDX/SPX 比值</div><div class="metric-val">'+(ind.ndx_spx_ratio!=null?ind.ndx_spx_ratio.toFixed(2):'---')+'</div></div>'
    +'<div class="metric-item"><div class="metric-name">10Y国债偏离MA50</div><div class="metric-val">'+(ind.tnx_ma50_diff!=null?ind.tnx_ma50_diff.toFixed(1)+'%':'---')+'</div></div>'
    +'<div class="metric-item"><div class="metric-name">ON RRP 余额</div><div class="metric-val">'+(ind.on_rrp_current!=null?ind.on_rrp_current.toFixed(2)+'T':'---')+'</div></div>'
  +'</div>'
  +(rec.length?'<div class="card"><div style="font-size:12px;color:var(--text-muted);margin-bottom:10px">近期信号</div><div class="recent-list">'+eventsHtml+'</div></div>':'');
  $id('panelSentiment').innerHTML=html
}

function loadFundData(){
  fetchJSON(FUND_URL).then(function(data){
    fundData = data;
    buildRestrictionUI();
  }).catch(function(e){
    $id('panelRestriction').innerHTML='<div class="error-box"><div class="msg">基金数据加载失败</div><button onclick="loadFundData()">重试</button></div>'
  })
}

function parseLimit(txt){
  if(!txt||txt==='N/A'||txt==='-') return null;
  var m=txt.match(/([\d.]+)(万?)元/)
  if(m){var v=parseFloat(m[1]);if(m[2]==='万')v*=10000;return v}
  return null
}

function getFundBadge(statusText){
  if(!statusText||statusText==='N/A') return '<span class="fund-badge fund-badge-info">未知</span>';
  var limit=parseLimit(statusText);
  if(statusText.indexOf('暂停申购')>=0){
    var cls='fund-badge-danger',label='暂停申购';
    if(limit!=null){if(limit<100)cls='fund-badge-danger';else if(limit<1000)cls='fund-badge-warn';else cls='fund-badge-info'}
    var m=statusText.match(/\(单日累计购买上限([\d.]+(?:万)?元)\)/);
    if(m)label='限购 '+m[1]
    return '<span class="fund-badge '+cls+'">'+label+'</span>'
  }
  if(statusText.indexOf('正常')>=0||statusText.indexOf('开放')>=0) return '<span class="fund-badge fund-badge-ok">可申购</span>'
  return '<span class="fund-badge fund-badge-info">'+statusText+'</span>'
}

function parsePct(str){
  if(!str||str==='N/A'||str==='-') return 0;
  return parseFloat(str.replace('%',''))||0
}
function getNetReturn(f){
  return parsePct(f['近1年']) - parsePct(f['合计费率'])
}
function isBuyable(f){
  var s=f['交易状态']||'';
  return s.indexOf('暂停申购')<0&&s.indexOf('暂停赎回')<0
}

function calcBuyableAmount(list){
  var total=0;
  for(var i=0;i<list.length;i++){
    var s=list[i]['交易状态']||'';
    if(s.indexOf('暂停申购')>=0) continue;
    var m=s.match(/单日累计购买上限([\d.]+)(万?)元/);
    if(m){var v=parseFloat(m[1])||0;if(m[2]==='万')v*=10000;total+=v}
  }
  return total
}
function formatBuyableAmount(total){
  if(total>=10000) return (total/10000).toFixed(2)+'万元';
  return total.toFixed(0)+'元'
}

function buildRestrictionUI(){
  if(!fundData||fundData.length===0){$id('panelRestriction').innerHTML='<div class="error-box"><div class="msg">暂无基金数据</div><button onclick="loadFundData()">重试</button></div>';return}
  var nasdaq=[],sp500=[];
  for(var i=0;i<fundData.length;i++){
    var f=fundData[i];
    if(f['分类']==='nasdaq') nasdaq.push(f);
    else if(f['分类']==='sp500') sp500.push(f);
  }
  nasdaq.sort(function(a,b){return getNetReturn(b)-getNetReturn(a)});
  sp500.sort(function(a,b){return getNetReturn(b)-getNetReturn(a)});

  function renderGroup(title,list){
    var h='';
    var buyable=calcBuyableAmount(list);
    h+='<div class="fund-summary"><span>'+title+'</span><span>可买入：<span class="fund-summary-val">'+formatBuyableAmount(buyable)+'</span></span></div>';
    for(var i=0;i<list.length;i++){
      var f=list[i];
      var netRet=getNetReturn(f);
      var netRetStr=netRet.toFixed(2)+'%';
      var netRetCls=netRet>0?'up':'down';
      var retRaw=f['近1年']||'-';
      var limit=parseLimit(f['交易状态']);
      h+='<div class="fund-card">'
        +'<div class="fund-card-top">'
          +'<div><div class="fund-name">'+f['基金名称']+'</div><div class="fund-code">'+f['基金代码']+' · '+f['类型']+'类</div></div>'
          +getFundBadge(f['交易状态'])
        +'</div>'
        +'<div class="fund-card-meta">'
          +'<div class="fund-meta-item"><span class="fund-meta-label">近一年收益</span><span class="'+netRetCls+'" style="font-weight:700;font-size:13px">'+netRetStr+'</span></div>'
          +'<div class="fund-meta-item"><span class="fund-meta-label">近1年(未扣费)</span><span>'+retRaw+'</span></div>'
          +'<div class="fund-meta-item"><span class="fund-meta-label">合计费率</span><span>'+(f['合计费率']||'-')+'</span></div>'
        +'</div>'
        +(limit!=null&&limit>0?'<div class="purchase-limit">每日上限: <strong>'+limit.toLocaleString()+'元</strong></div>':'')
      +'</div>';
    }
    return h
  }
  var html=''
    +'<div class="fund-group-title">纳斯达克100<span class="fund-group-count">'+nasdaq.length+'只基金</span></div>'
    +renderGroup('纳斯达克100',nasdaq)
    +'<div class="fund-group-title" style="margin-top:16px">标普500<span class="fund-group-count">'+sp500.length+'只基金</span></div>'
    +renderGroup('标普500',sp500);
  $id('panelRestriction').innerHTML=html
}

function refreshAll(){
  var btn=$id('btnRefresh');btn.classList.add('spinning')
  loadStaticData().then(function(){return loadLiveData()}).then(function(){buildSentimentUI()})
    .catch(function(e){console.error(e);if(!currentData){$id('panelSentiment').innerHTML='<div class="error-box"><div class="msg">数据加载失败</div><button onclick="refreshAll()">重试</button></div>'}else{buildSentimentUI()}})
    .finally(function(){btn.classList.remove('spinning')})
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

document.addEventListener('DOMContentLoaded',function(){
  refreshAll();
  setInterval(refreshAll,5*60*1000);
})
</script>
