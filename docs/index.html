<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<meta name="theme-color" content="#0a0e17">

<title>美股情绪监测</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0e17;
  --bg-card:#131824;
  --bg-card-hover:#1a2032;
  --text-primary:#e8eaed;
  --text-secondary:#9aa0a6;
  --text-muted:#5f6368;
  --border-card:#1e2a3a;
  --green:#34a853;
  --green-bg:rgba(52,168,83,0.12);
  --green-border:rgba(52,168,83,0.3);
  --red:#ea4335;
  --red-bg:rgba(234,67,53,0.12);
  --red-border:rgba(234,67,53,0.3);
  --orange:#f9ab00;
  --orange-bg:rgba(249,171,0,0.12);
  --orange-border:rgba(249,171,0,0.3);
  --yellow:#fbbc04;
  --blue:#4285f4;
  --blue-bg:rgba(66,133,244,0.12);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --tab-height:56px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:calc(var(--tab-height) + 8px + var(--safe-bottom));
}
.header{
  position:sticky;top:0;z-index:100;
  background:var(--bg-primary);
  padding:12px 16px;
  border-bottom:1px solid var(--border-card);
  display:flex;align-items:center;justify-content:space-between;
}
.header-title{font-size:17px;font-weight:700;letter-spacing:.3px}
.header-right{display:flex;align-items:center;gap:10px}
.header-update{font-size:11px;color:var(--text-muted)}
.btn-refresh{
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border-card);background:var(--bg-card);
  color:var(--text-secondary);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s
}
.btn-refresh:active{background:var(--bg-card-hover);transform:scale(.95)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{
  padding:6px 16px;font-size:10px;color:var(--text-muted);
  display:flex;align-items:center;gap:6px
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted)}
.status-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.status-dot.stale{background:var(--orange)}
.container{padding:8px 12px}
.tab-panel{display:none}
.tab-panel.active{display:block}
.card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:14px;padding:16px;margin-bottom:10px
}
.signal-hero{text-align:center;padding:20px 16px 16px;border-width:2px}
.signal-label{font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.signal-emotion{font-size:32px;font-weight:800;margin-bottom:4px}
.signal-strength{font-size:13px;margin-bottom:10px}
.signal-fear{color:var(--green);border-color:var(--green-border)}
.signal-fear .card,.signal-fear.signal-hero{background:var(--green-bg)}
.signal-greed{color:var(--red);border-color:var(--red-border)}
.signal-greed .card,.signal-greed.signal-hero{background:var(--red-bg)}
.signal-neutral{color:var(--yellow);border-color:var(--orange-border)}
.signal-neutral .card,.signal-neutral.signal-hero{background:var(--orange-bg)}
.position-row{display:flex;gap:12px;flex-wrap:wrap}
.position-item{flex:1;min-width:0;text-align:center}
.position-val{font-size:22px;font-weight:700;margin-bottom:2px}
.position-label{font-size:11px;color:var(--text-muted)}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric-item{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:12px
}
.metric-name{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.metric-val{font-size:17px;font-weight:600}
.metric-sub{font-size:10px;color:var(--text-muted);margin-top:2px}
.index-compare{display:flex;gap:12px}
.index-block{flex:1;text-align:center}
.index-name{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.index-price{font-size:18px;font-weight:700}
.index-dev{font-size:11px;margin-top:3px}
.recent-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border-card)
}
.recent-item:last-child{border-bottom:none}
.recent-date{font-size:11px;color:var(--text-muted);width:80px}
.recent-emotion{font-size:12px;font-weight:600;width:58px}
.recent-position{font-size:12px;color:var(--text-secondary);width:50px;text-align:center}
.recent-action{font-size:11px;color:var(--text-muted);text-align:right}
.tag{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:10px;font-weight:600
}
.tag-green{background:var(--green-bg);color:var(--green)}
.tag-red{background:var(--red-bg);color:var(--red)}
.tag-yellow{background:var(--orange-bg);color:var(--orange)}
.tag-blue{background:var(--blue-bg);color:var(--blue)}
.toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none
}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px}
.error-box{text-align:center;padding:24px 16px}
.error-box .msg{color:var(--red);font-size:14px;margin-bottom:12px}
.error-box button{
  background:var(--bg-card);border:1px solid var(--border-card);
  color:var(--text-primary);padding:8px 24px;border-radius:20px;font-size:13px;cursor:pointer
}
.up{color:var(--green)}.down{color:var(--red)}

.tab-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg-card);border-top:1px solid var(--border-card);
  display:flex;padding-bottom:var(--safe-bottom)
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 4px;border:none;background:none;color:var(--text-muted);
  font-size:10px;cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent
}
.tab-btn.active{color:var(--blue)}
.tab-btn svg{width:20px;height:20px;margin-bottom:2px}

.fund-group-title{
  font-size:13px;font-weight:700;color:var(--text-secondary);
  padding:6px 0;margin-bottom:6px
}
.fund-group-count{
  font-size:11px;color:var(--text-muted);font-weight:400;margin-left:4px
}
.fund-card{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:12px;margin-bottom:6px
}
.fund-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.fund-name{font-size:13px;font-weight:600;line-height:1.4;flex:1;min-width:0;padding-right:8px}
.fund-code{font-size:10px;color:var(--text-muted);font-family:monospace}
.fund-badge{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;
  font-weight:600;white-space:nowrap;flex-shrink:0
}
.fund-badge-danger{background:rgba(234,67,53,0.15);color:#ef4444}
.fund-badge-warn{background:rgba(249,171,0,0.15);color:#f59e0b}
.fund-badge-ok{background:rgba(16,185,129,0.15);color:#10b981}
.fund-badge-info{background:var(--blue-bg);color:var(--blue)}
.fund-card-meta{display:flex;gap:12px;font-size:11px;color:var(--text-secondary)}
.fund-meta-item{display:flex;flex-direction:column}
.fund-meta-label{color:var(--text-muted);font-size:9px}
.purchase-limit{font-size:12px;font-weight:600;color:var(--text-primary);margin-top:4px;padding-top:4px;border-top:1px solid var(--border-card)}
.fund-summary{
  background:var(--bg-card);border:1px solid var(--border-card);
  border-radius:10px;padding:10px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;font-size:12px
}
.fund-summary-val{font-weight:700;color:var(--blue)}
.fund-update-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:4px}
.btn-fund-update{
  background:var(--blue-bg);border:1px solid rgba(66,133,244,0.3);
  color:var(--blue);padding:6px 16px;border-radius:16px;font-size:12px;
  cursor:pointer;font-weight:600;transition:all .2s
}
.btn-fund-update:active{transform:scale(.95);opacity:.8}
.btn-fund-update:disabled{opacity:.5;cursor:not-allowed}
.fund-progress{width:100%;height:3px;background:var(--border-card);border-radius:2px;margin-top:6px;overflow:hidden;display:none}
.fund-progress.active{display:block}
.fund-progress-bar{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;width:0}
.fund-source-tag{font-size:9px;padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
.fund-source-api{background:rgba(52,168,83,0.15);color:#34a853}
.fund-source-local{background:rgba(249,171,0,0.15);color:#f9ab00}
.fund-update-btns{display:flex;gap:6px}
.btn-status-update{background:rgba(249,171,0,0.12)!important;border-color:rgba(249,171,0,0.3)!important;color:#f9ab00!important}
</style>
</head>
<body>

<div class="header">
  <div class="header-title" id="headerTitle">美股情绪监测</div>
  <div class="header-right">
    <span class="header-update" id="updateTime">加载中...</span>
    <button class="btn-refresh" id="btnRefresh" onclick="refreshAll()" aria-label="刷新">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="status-bar" id="statusBar"><span class="status-dot" id="statusDot"></span><span id="statusText">加载中...</span></div>

<div class="container">
  <div class="tab-panel active" id="panelSentiment"><div class="loading">加载中，请稍候...</div></div>
  <div class="tab-panel" id="panelRestriction"><div class="loading">加载中，请稍候...</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tabSentiment" onclick="switchTab('sentiment')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    情绪监测
  </button>
  <button class="tab-btn" id="tabRestriction" onclick="switchTab('restriction')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    限购查询
  </button>
</div>

<script>


// ═══════════════════════════════════════════════════════════════════
//  US Stock Sentiment - Mobile (Self-sufficient Live Version)
//  Computes everything from Yahoo Finance in the browser
// ═══════════════════════════════════════════════════════════════════

var DATA_URL = 'data/latest.json';
var FUND_URL = 'data/real_fund_data.json';
var currentData = null;
var fundData = [];
var yfData = {};
var fetchTimeout = 12000;
var currentTab = 'sentiment';
var fundApiUpdating = false;
var fundApiTime = null;
var fundStatusUpdating = false;
var fundStatusTime = null;

// ── 情绪策略阈值（与 strategy_rules.py 保持一致）──
var THRESHOLDS = {
  extremeFear: { vix_term: 1.0, vix: 35, credit_spread: 8.0, ndx_drawdown: -30, spx_drawdown: -20, ndx_breadth: 15 },
  fear: { vix: [25,35], credit_spread: [5.5,8], ndx_drawdown: [-30,-15], spx_drawdown: [-20,-10], ndx_breadth: [15,25] },
  extremeGreed: { ndx_dev_ma200: 28, spx_dev_ma200: 18, vix_low_ndx_dev: { vix: 13, ndx_dev: 22 } },
  greed: { ndx_dev_ma200: 20, spx_dev_ma200: 12, vix_low_ndx_dev: { vix: [12,16], ndx_dev: 15 } }
};
var POSITION_MAP = {
  '极度恐慌': { above200: 100, below200: 100 },
  '恐慌': { above200: 100, below200: 100 },
  '中性': { above200: 100, below200: 88 },
  '贪婪': { above200: 90, below200: 70 },
  '极度贪婪': { above200: 65, below200: 55 }
};
var SIP_MULTIPLIER = { '极度恐慌': 5, '恐慌': 3, '中性': 1, '贪婪': 0, '极度贪婪': 0 };
var DAILY_DCA = 300;

// ── 工具函数 ──
function $id(id){return document.getElementById(id)}
function showToast(msg,type){var t=$id('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(function(){t.className='toast'},3000)}
function setStatus(live,msg){if(live){$id('statusDot').className='status-dot live'}else{$id('statusDot').className='status-dot stale'}$id('statusText').textContent=msg}
function switchTab(name){
  if(name==='restriction'){loadFundData()}
  currentTab=name;
  var panels=document.querySelectorAll('.tab-panel'),btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<panels.length;i++){panels[i].classList.toggle('active',panels[i].id==='panel'+name.charAt(0).toUpperCase()+name.slice(1))}
  for(var i=0;i<btns.length;i++){btns[i].classList.toggle('active',btns[i].id==='tab'+name.charAt(0).toUpperCase()+name.slice(1))}
}
function parseLimit(s){if(!s||s==='--')return null;var m=s.match(/([\\d,.]+)/);return m?parseFloat(m[1].replace(/,/g,'')):null}
function hasPurchaseLimit(s){return s&&s.indexOf('限购')>=0}
function getSentimentClass(level){
  if(!level)return'';
  if(level.indexOf('恐慌')>=0)return'signal-fear';
  if(level.indexOf('贪婪')>=0)return'signal-greed';
  return'signal-neutral'
}
function getEmotionColorClass(level){
  if(!level)return'';
  if(level.indexOf('恐慌')>=0)return'signal-fear';
  if(level.indexOf('贪婪')>=0)return'signal-greed';
  return'signal-neutral'
}
function fmtNum(v,dec){return v!=null?Number(v).toLocaleString(undefined,{minimumFractionDigits:dec||0,maximumFractionDigits:dec||0}):'---'}
function fmtPct(v){return v!=null?v.toFixed(1)+'%':'---'}

// ── Yahoo Finance 数据获取 ──
function fetchYF(symbol){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},fetchTimeout);
  var url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval=1d&range=5d';
  return fetch(url,{signal:ctrl.signal})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .then(function(d){
      var meta=d.chart.result[0].meta;
      var quote=d.chart.result[0].indicators.quote[0];
      var n=quote.close.length;
      return {symbol:symbol,price:quote.close[n-1],prevClose:meta.chartPreviousClose,high:meta.regularMarketDayHigh,low:meta.regularMarketDayLow}
    })
    .catch(function(e){clearTimeout(tid);return null})
}

// 获取含历史收盘价的Yahoo数据
function fetchYFHistory(symbol, range){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},15000);
  var url='https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(symbol)+'?interval=1d&range='+(range||'1y');
  return fetch(url,{signal:ctrl.signal})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .then(function(d){
      var result=d.chart.result[0];
      var meta=result.meta;
      var timestamps=result.timestamp||[];
      var quote=result.indicators.quote[0];
      var closes=quote.close||[];
      var prices=[];
      for(var i=0;i<closes.length;i++){
        if(closes[i]!=null)prices.push(closes[i]);
      }
      return {symbol:symbol,price:prices.length>0?prices[prices.length-1]:null,prevClose:meta.chartPreviousClose,closes:prices}
    })
    .catch(function(e){clearTimeout(tid);return null})
}

// ── 技术指标计算 ──
function calcSMA(prices, period){
  if(!prices||prices.length<period)return null;
  var sum=0;
  for(var i=prices.length-period;i<prices.length;i++){sum+=prices[i]}
  return sum/period
}
function calcDrawdown(prices, lookbackDays){
  if(!prices||prices.length<2)return null;
  var n=prices.length;
  var start=Math.max(0,n-lookbackDays);
  var high=-Infinity;
  for(var i=start;i<n;i++){if(prices[i]>high)high=prices[i]}
  var cur=prices[n-1];
  return ((cur-high)/high)*100
}
function calcDeviation(current, ref){
  if(current==null||ref==null||ref===0)return null;
  return ((current-ref)/ref)*100
}

// ── 情绪计算引擎（移植自 strategy_rules.py）──
function calcEmotionCore(ndx_drawdown, spx_drawdown, ndx_dev_ma200, spx_dev_ma200, vix, vix_term, rate_shock){
  var T=THRESHOLDS;
  // 极度恐慌检查
  if(vix_term!=null&&vix_term>T.extremeFear.vix_term) return ['极度恐慌',['vix_term']];
  if(vix!=null&&vix>T.extremeFear.vix) return ['极度恐慌',['vix']];
  if(rate_shock&&ndx_drawdown!=null&&ndx_drawdown<=T.extremeFear.ndx_drawdown) return ['极度恐慌',['ndx_drawdown']];
  if(rate_shock&&spx_drawdown!=null&&spx_drawdown<=T.extremeFear.spx_drawdown) return ['极度恐慌',['spx_drawdown']];
  
  // 恐慌检查
  if(vix!=null&&vix>=T.fear.vix[0]&&vix<T.fear.vix[1]) return ['恐慌',['vix']];
  if(rate_shock&&ndx_drawdown!=null&&ndx_drawdown>T.fear.ndx_drawdown[0]&&ndx_drawdown<=T.fear.ndx_drawdown[1]) return ['恐慌',['ndx_drawdown']];
  if(rate_shock&&spx_drawdown!=null&&spx_drawdown>T.fear.spx_drawdown[0]&&spx_drawdown<=T.fear.spx_drawdown[1]) return ['恐慌',['spx_drawdown']];
  
  // 极度贪婪检查
  if(ndx_dev_ma200!=null&&ndx_dev_ma200>T.extremeGreed.ndx_dev_ma200) return ['极度贪婪',['ndx_dev_ma200']];
  if(spx_dev_ma200!=null&&spx_dev_ma200>T.extremeGreed.spx_dev_ma200) return ['极度贪婪',['spx_dev_ma200']];
  if(vix!=null&&vix<T.extremeGreed.vix_low_ndx_dev.vix&&ndx_dev_ma200!=null&&ndx_dev_ma200>T.extremeGreed.vix_low_ndx_dev.ndx_dev) return ['极度贪婪',['vix_low_ndx_dev']];
  
  // 贪婪检查
  if(ndx_dev_ma200!=null&&ndx_dev_ma200>T.greed.ndx_dev_ma200) return ['贪婪',['ndx_dev_ma200']];
  if(spx_dev_ma200!=null&&spx_dev_ma200>T.greed.spx_dev_ma200) return ['贪婪',['spx_dev_ma200']];
  if(vix!=null&&vix>=T.greed.vix_low_ndx_dev.vix[0]&&vix<T.greed.vix_low_ndx_dev.vix[1]&&ndx_dev_ma200!=null&&ndx_dev_ma200>T.greed.vix_low_ndx_dev.ndx_dev) return ['贪婪',['vix_low_ndx_dev']];
  
  return ['中性',[]]
}

function calcSignalStrength(sentiment, triggers, pcrBonus){
  var dims=new Set();
  for(var i=0;i<triggers.length;i++){
    var t=triggers[i];
    if(t==='vix'||t==='vix_term'||t==='vix_low_ndx_dev') dims.add('波动率');
    else if(t==='ndx_drawdown'||t==='spx_drawdown'||t==='ndx_dev_ma200'||t==='spx_dev_ma200') dims.add('技术面');
  }
  var n=dims.size+(pcrBonus?1:0);
  if(n>=3) return '★★★★★ 极强';
  if(n>=2) return '★★★★ 强';
  if(n>=1) return '★★★ 中等';
  return '★ 弱'
}

function getTargetPosition(sentiment, ndxAboveMa200){
  var m=POSITION_MAP[sentiment];
  if(!m) return 100;
  return ndxAboveMa200?m.above200:m.below200
}

function getPositionAdvice(sentiment, currentPos, targetPos){
  if(!currentPos||currentPos==null) return '';
  if(sentiment.indexOf('恐慌')>=0) return '分批加仓';
  if(sentiment==='中性') return '维持定投';
  var diff=targetPos-currentPos;
  if(diff>10) return '适度加仓';
  if(diff<-10) return '适度减仓';
  return '维持仓位'
}

function getDailyBuyAmount(sentiment){
  var m=SIP_MULTIPLIER[sentiment];
  return (m!=null?m:1)*DAILY_DCA
}

function calcRateShock(tnxMa50Diff){
  return tnxMa50Diff!=null&&tnxMa50Diff>10
}

// ── 从Yahoo实时数据计算情绪 ──
function computeLiveSentiment(){
  // 检查是否真的获取到了实时数据（Yahoo在浏览器端常被CORS拦截）
  var hasLive=yfData.vix||yfData.qqq||yfData.spy||(yfData.ndx&&yfData.ndx.price);
  if(!hasLive){
    liveData=null;
    return null
  }
  // 获取NDX和GSPC的历史价格
  var ndx=yfData.ndx, gspc=yfData.gspc;
  var tnx=yfData.tnx;
  var vixData=yfData.vix, vix3mData=yfData.vix3m;
  var qqq=yfData.qqq, spy=yfData.spy;
  
  // NDX指标
  var ndxPrice=ndx?ndx.price:(qqq?qqq.price*10:null);  // NDX ~ QQQ*10 approx
  var ndxMa200=ndx?calcSMA(ndx.closes,200):null;
  var ndxDevMa200=calcDeviation(ndxPrice,ndxMa200);
  var ndxDrawdown=ndx?calcDrawdown(ndx.closes,252):null;
  
  // SPX指标
  var spxPrice=gspc?gspc.price:(spy?spy.price:null);
  var spxMa200=gspc?calcSMA(gspc.closes,200):null;
  var spxDevMa200=calcDeviation(spxPrice,spxMa200);
  var spxDrawdown=gspc?calcDrawdown(gspc.closes,252):null;
  
  // VIX指标
  var vix=vixData?vixData.price:null;
  var vixTerm=vixData&&vix3mData&&vix3mData.price?vixData.price/vix3mData.price:null;
  
  // TNX MA50 (rate shock)
  var tnxMa50=tnx&&tnx.closes&&tnx.closes.length>50?calcSMA(tnx.closes,50):null;
  var tnxMa50Diff=null;
  if(tnx&&tnx.price!=null&&tnxMa50!=null) tnxMa50Diff=calcDeviation(tnx.price,tnxMa50);
  var rateShock=calcRateShock(tnxMa50Diff);
  
  // 当前价格（显示用）
  var ndxDisp=ndx?ndx.price:(qqq?qqq.price*10:null);
  var spxDisp=gspc?gspc.price:(spy?spy.price:null);
  if(ndxDisp==null) ndxDisp=ndxPrice;
  if(spxDisp==null) spxDisp=spxPrice;
  
  // NDX/SPX 比值
  var ndxSpxRatio=spxPrice?(ndxPrice||ndxDisp)/spxPrice:null;
  
  // IWM/SPY
  var iwm=yfData.iwm;
  var iwmSpyRatio=spxPrice&&iwm?iwm.price/spxPrice:null;
  
  // 情绪计算
  var emotionResult=calcEmotionCore(ndxDrawdown, spxDrawdown, ndxDevMa200, spxDevMa200, vix, vixTerm, rateShock);
  var sentiment=emotionResult[0];
  var triggers=emotionResult[1];
  
  var isNdxAbove200=ndxDevMa200!=null&&ndxDevMa200>0;
  var targetPos=getTargetPosition(sentiment, isNdxAbove200);
  var dailyBuy=getDailyBuyAmount(sentiment);
  var advice=getPositionAdvice(sentiment, 50, targetPos);
  
  // 信号强度（不含PCR增强，因为浏览器难以获取）
  var strength=calcSignalStrength(sentiment, triggers, false);
  
  var now=new Date();
  var mm=String(now.getMonth()+1).padStart(2,'0');
  var dd=String(now.getDate()).padStart(2,'0');
  var hh=String(now.getHours()).padStart(2,'0');
  var mi=String(now.getMinutes()).padStart(2,'0');
  
  liveData={
    last_update: now.getFullYear()+'-'+mm+'-'+dd+' '+hh+':'+mi+':'+String(now.getSeconds()).padStart(2,'0'),
    sentiment_result: sentiment,
    signal_strength: strength,
    sentiment_conditions: triggers,
    position_advice: advice,
    target_position: targetPos,
    daily_buy_amount: dailyBuy,
    current_vix: vix,
    vix_term_ratio: vixTerm,
    current_nasdaq100: ndxDisp,
    current_sp500: spxDisp,
    nasdaq100_drawdown: ndxDrawdown,
    sp500_drawdown: spxDrawdown,
    nasdaq100_dev_ma200: ndxDevMa200,
    sp500_dev_ma200: spxDevMa200,
    ndx_breadth_200ma: null,  // 浏览器无法获取
    ndx_spx_ratio: ndxSpxRatio,
    iwm_spy_ratio: iwmSpyRatio,
    tnx_ma50_diff: tnxMa50Diff,
    rate_shock: rateShock,
    is_live: true
  };
  return liveData
}

function fetchJSON(url,timeout){
  var ctrl=new AbortController();
  var tid=setTimeout(function(){ctrl.abort()},timeout||fetchTimeout);
  return fetch(url,{signal:ctrl.signal,cache:'no-cache'})
    .then(function(r){clearTimeout(tid);if(!r.ok)throw Error('HTTP '+r.status);return r.json()})
    .catch(function(e){clearTimeout(tid);throw e})
}

  setStatus(false,'获取实时数据...');

    fetchYF('^VIX').catch(function(){return null}),

    fetchYF('QQQ').catch(function(){return null}),
    fetchYF('SPY').catch(function(){return null}),
    fetchYF('^TNX').catch(function(){return null}),
    fetchYFHistory('^NDX','1y').catch(function(){return null}),
    fetchYFHistory('^GSPC','1y').catch(function(){return null}),
    fetchYF('IWM').catch(function(){return null})
  ]).then(function(r){

  })
}

// ── 基金辅助函数 ──
function parsePct(str){
  if(!str||str==='N/A'||str==='-') return 0;
  return parseFloat(str.replace('%',''))||0
}
function getNetReturn(f){return parsePct(f['近1年']) - parsePct(f['合计费率'])}
function isBuyable(f){var s=f['交易状态']||'';return s.indexOf('暂停申购')<0&&s.indexOf('暂停赎回')<0}
function getStatusBadge(statusText){
  if(!statusText||statusText==='--'||statusText==='N/A')return'<div style="text-align:right"><span class="fund-badge fund-badge-info">未知</span></div>';
  var mainText=statusText;
  var limitText='';
  var m=statusText.match(/\(单日累计购买上限([\d.]+)(万?)元\)/);
  if(m){mainText=statusText.replace(m[0],'').trim();limitText=m[0]}
  var cls='fund-badge-info';
  if(mainText.indexOf('暂停申购')>=0){cls='fund-badge-danger'}
  else if(m){var lim=parseFloat(m[1]);if(m[2]==='万')lim*=10000;cls=lim<100?'fund-badge-danger':lim<1000?'fund-badge-warn':'fund-badge-ok'}
  else if(mainText.indexOf('开放申购')>=0||mainText.indexOf('正常')>=0){cls='fund-badge-ok'}
  var h='<div style="text-align:right"><span class="fund-badge '+cls+'">'+mainText+'</span>';
  if(limitText)h+='<div style="font-size:10px;color:var(--text-muted);margin-top:2px">'+limitText+'</div>';
  return h+'</div>'
}
function formatBuyableAmount(total,count){
  if(total==null||total===0)return'<span style="color:var(--text-muted)">0</span>';
  var amt='';
  if(total>=100000000)amt=(total/100000000).toFixed(1)+'亿';
  else if(total>=10000)amt=(total/10000).toFixed(0)+'万';
  else amt=total.toLocaleString();
  return'<span style="color:var(--green)">'+count+'只 / '+amt+'元</span>'
}
function calcBuyableAmount(list){
  var total=0,count=0;
  for(var i=0;i<list.length;i++){
    var f=list[i],s=f['交易状态']||'';
    if(s.indexOf('暂停申购')>=0||s.indexOf('限制申购')>=0)continue;
    var m=s.match(/\(单日累计购买上限([\d.]+)(万?)元\)/);
    if(m){var val=parseFloat(m[1])||0;if(m[2]==='万')val*=10000;total+=val;count++}
  }
  return{total:total,count:count}
}

// ── 基金基金实时数据更新 ──
var fundApiResults=[];var fundApiOk=0;var fundApiTotal=0;
function fetchFundRealtime(code){
  return new Promise(function(resolve,reject){
    var script=document.createElement('script');
    var tid=setTimeout(function(){cleanup();reject(new Error('timeout'))},6000);
    function cleanup(){clearTimeout(tid);window.jsonpgz=null;if(script.parentNode)script.parentNode.removeChild(script)}
    window.jsonpgz=function(data){cleanup();resolve(data)};
    script.src='https://push2.eastmoney.com/api/qt/ulist.np/get?fields=f3,f12,f14,f2&secids=0.'+code+'&cb=jsonpgz';
    document.body.appendChild(script)
  })
}
function mergeApiData(apiResults, okCount){
  var now=new Date();
  for(var i=0;i<fundData.length;i++){
    var f=fundData[i],api=apiResults[i];
    if(api&&api.data&&api.data.diff&&api.data.diff.length>0){
      var d=api.data.diff[0];
      // d.f3 是日涨跌幅，不要覆盖缓存中的"近1年"
      f['日涨跌幅']=d.f3!=null?d.f3.toFixed(2)+'%':'--';
      f['实时净值']=d.f2;
      f.基金代码=''+d.f12;
      f._apiSource=true
    }
  }
  var msg='已更新 '+okCount+'/'+fundData.length+' 只基金实时净值';
  showToast(msg,'success');
  if(typeof buildRestrictionUI==='function')buildRestrictionUI()
}
function updateFundDataFromAPI(){
  if(fundApiUpdating)return;
  fundApiUpdating=true;
  var progressWrap=document.getElementById('fundProgress');
  var btnUpdate=document.getElementById('btnFundUpdate');
  if(progressWrap)progressWrap.classList.add('active');
  if(btnUpdate)btnUpdate.disabled=true;
  var total=fundData.length,done=0,ok=0,results=[];
  function updateProgress(){
    var pct=Math.round(done/total*100);
    var pb=document.getElementById('fundProgressBar');
    if(pb)pb.style.width=pct+'%';
    if(btnUpdate)btnUpdate.textContent=done+'/'+total
  }
  function next(){
    if(done>=total){
      fundApiUpdating=false;
      fundApiTime=new Date();
      if(btnUpdate){btnUpdate.disabled=false;btnUpdate.textContent='在线更新'}
      if(progressWrap)progressWrap.classList.remove('active');
      var pb=document.getElementById('fundProgressBar');
      if(pb)pb.style.width='0';
      mergeApiData(results,ok);
      showToast('已更新 '+ok+'/'+total+' 只基金实时数据','success');
      return
    }
    var f=fundData[done];
    if(!f||!f.基金代码){done++;next();return}
    fetchFundRealtime(f.基金代码).then(function(data){
      results[done]=data;ok++;done++;updateProgress();next()
    }).catch(function(){
      results[done]=null;done++;updateProgress();next()
    })
  }
  updateProgress();next()
}

// 更新交易状态（目前留空，原有功能可复用updateFundDataFromAPI）
function updateTradeStatus(){
  showToast('交易状态查询功能已整合到在线更新','info')
}
function refreshAll(){
  var btn=$id('btnRefresh');btn.classList.add('spinning');
  setStatus(false,'获取实时数据...');
  
  // 先尝试加载快照数据（作为回退），同时获取实时数据
  Promise.all([
    loadStaticData().catch(function(){return null}),
    loadLiveData()
  ]).then(function(){
    // 使用实时数据计算情绪
    computeLiveSentiment();
    if(!liveData && currentData){
      setStatus(false,'静态数据'+(currentData.last_update?' ('+currentData.last_update+')':''));
    }
    buildSentimentUI();
  }).catch(function(e){
    console.error(e);
    // 如果实时数据失败，回退到快照
    if(currentData){
      liveData=null;
      buildSentimentUI();
    } else {
      $id('panelSentiment').innerHTML='<div class="error-box" style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:12px">📡</div><div style="font-size:14px;color:var(--text-muted)">数据加载失败</div><button onclick="refreshAll()" style="margin-top:16px;padding:10px 32px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:14px;cursor:pointer">重试</button></div>';
    }
  }).finally(function(){
    btn.classList.remove('spinning');
    // 显示数据实际更新时间（静态数据用 last_update，实时数据用当前时间）
    var d=liveData||currentData;
    if(d&&d.last_update){
      $id('updateTime').textContent=d.last_update;
    }else{
      var now=new Date();
      var mm=String(now.getMonth()+1).padStart(2,'0');
      var dd=String(now.getDate()).padStart(2,'0');
      var hh=String(now.getHours()).padStart(2,'0');
      var mi=String(now.getMinutes()).padStart(2,'0');
      $id('updateTime').textContent=mm+'-'+dd+' '+hh+':'+mi;
    }
  })
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

document.addEventListener('DOMContentLoaded',function(){
  refreshAll();
  setInterval(refreshAll,5*60*1000);
})
