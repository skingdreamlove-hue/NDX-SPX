<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美股场外基金限购查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: var(--page-bg);
            color: var(--page-text);
            line-height: 1.5;
        }
        :root {
            --page-bg: #F9FAFB;
            --page-text: #111827;
            --card-bg: #fff;
            --card-border: #E5E7EB;
            --card-header-border: #F3F4F6;
            --muted-text: #6B7280;
            --faint-text: #9CA3AF;
            --badge-danger: #EF4444;
            --badge-warning: #F59E0B;
            --badge-success: #10B981;
            --badge-info: #3B82F6;
            --badge-default: #9CA3AF;
            --pos-color: #DC2626;
            --neg-color: #059669;
            --buyable-bg: #ECFDF5;
            --buyable-text: #059669;
            --btn-primary-bg: #111827;
            --btn-primary-hover: #374151;
            --spinner-border: #E5E7EB;
            --spinner-top: #6366F1;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --page-bg: #0f1117;
                --page-text: #e8ecf4;
                --card-bg: #181c27;
                --card-border: #2a3050;
                --card-header-border: #2a3050;
                --muted-text: #8892b0;
                --faint-text: #5a6580;
                --buyable-bg: rgba(16,185,129,.12);
                --buyable-text: #34D399;
                --btn-primary-bg: #e8ecf4;
                --btn-primary-hover: #c8cee0;
                --spinner-border: #2a3050;
                --spinner-top: #818CF8;
                --pos-color: #EF4444;
                --neg-color: #34D399;
            }
        }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .header { margin-bottom: 16px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .header-title { font-size: 22px; font-weight: 700; }
        .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .update-info { font-size: 12px; color: var(--muted-text); }
        .mode-badge { font-size: 11px; padding: 2px 8px; border-radius: 9999px; font-weight: 600; }
        .mode-badge.live { background: #DCFCE7; color: #166534; }
        .mode-badge.static { background: #F3F4F6; color: #6B7280; }
        @media (prefers-color-scheme: dark) {
            .mode-badge.live { background: rgba(22,101,52,0.3); color: #86EFAC; }
            .mode-badge.static { background: rgba(107,114,128,0.3); color: #9CA3AF; }
        }
        .btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 8px 14px; border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all .15s; white-space: nowrap;
        }
        .btn-primary { background: var(--btn-primary-bg); color: var(--card-bg); }
        .btn-primary:hover { background: var(--btn-primary-hover); }
        .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
        .btn-secondary { background: transparent; color: var(--page-text); border: 1px solid var(--card-border); }
        .btn-success { background: #059669; color: #fff; }
        .btn-danger { background: #DC2626; color: #fff; }

        .token-row { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; align-items: center; }
        .token-input { flex: 1; min-width: 200px; padding: 8px 12px; border: 1px solid var(--card-border); border-radius: 8px; font-size: 12px; background: var(--card-bg); color: var(--page-text); outline: none; }
        .token-input:focus { border-color: var(--spinner-top); }

        .summary-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .summary-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px; }
        .summary-card .label { font-size: 11px; color: var(--muted-text); margin-bottom: 2px; }
        .summary-card .value { font-size: 16px; font-weight: 700; }
        .summary-card .sub { font-size: 11px; color: var(--faint-text); margin-top: 2px; }
        .buyable-banner { background: var(--buyable-bg); color: var(--buyable-text); padding: 10px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 12px; }
        .search-bar { width: 100%; padding: 10px 14px; border: 1px solid var(--card-border); border-radius: 10px; font-size: 14px; background: var(--card-bg); color: var(--page-text); margin-bottom: 12px; outline: none; }
        .search-bar:focus { border-color: var(--spinner-top); }
        .fund-list { display: flex; flex-direction: column; gap: 8px; }
        .fund-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; padding: 12px; transition: background .12s; }
        .fund-card:active { background: var(--card-header-border); }
        .fund-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .fund-name { font-size: 13px; font-weight: 600; color: var(--page-text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .fund-code { font-size: 11px; color: var(--faint-text); margin-left: 8px; font-family: monospace; }
        .fund-body { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 12px; font-weight: 600; color: #fff; }
        .status-badge.danger { background: var(--badge-danger); }
        .status-badge.warning { background: var(--badge-warning); }
        .status-badge.success { background: var(--badge-success); }
        .status-badge.info { background: var(--badge-info); }
        .status-badge.default { background: var(--badge-default); }
        .fund-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted-text); }
        .fund-meta-item { display: flex; align-items: center; gap: 2px; }
        .fund-meta-item .pos { color: var(--pos-color); font-weight: 600; }
        .fund-meta-item .neg { color: var(--neg-color); font-weight: 600; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
        .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; border: 1px solid var(--card-border); border-radius: 8px; background: var(--card-bg); color: var(--muted-text); cursor: pointer; transition: all .15s; }
        .tab.active { background: var(--spinner-top); color: #fff; border-color: var(--spinner-top); }
        .loading-box { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--faint-text); font-size: 14px; gap: 8px; }
        .spinner { width: 18px; height: 18px; border: 2px solid var(--spinner-border); border-top-color: var(--spinner-top); border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .type-pill { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; }
        .type-pill.a { background: #EEF2FF; color: #4338CA; }
        .type-pill.c { background: #FEF3C7; color: #92400E; }
        @media (prefers-color-scheme: dark) {
            .type-pill.a { background: rgba(99,102,241,0.2); color: #A5B4FC; }
            .type-pill.c { background: rgba(245,158,11,0.2); color: #FCD34D; }
        }
        .nav-links { display: flex; gap: 6px; }
        .nav-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%); color: white; }
        .no-data { text-align: center; padding: 32px; color: var(--faint-text); font-size: 14px; }
        .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 500; z-index: 9999; animation: fadeIn .2s ease; }
        .toast.success { background: #059669; }
        .toast.error { background: #DC2626; }
        .toast.info { background: #3B82F6; }
        @keyframes fadeIn { from { opacity: 0; top: 0; } to { opacity: 1; top: 16px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <span class="header-title">限购查询</span>
                <span class="mode-badge static" id="modeBadge">自动更新</span>
                <div class="nav-links">
                    <a href="index.html" class="nav-btn">返回主页</a>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="updateBtn" onclick="handleUpdate()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    更新净值
                </button>
                <button class="btn btn-secondary" onclick="toggleTokenInput()">设置Token</button>
            </div>
            <div class="update-info" id="updateTime">加载中...</div>

            <div class="token-row" id="tokenRow" style="display:none;">
                <input class="token-input" id="tokenInput" type="password" placeholder="输入 GitHub Token (ghp_...)">
                <button class="btn btn-success" onclick="saveToken()">保存</button>
                <button class="btn btn-secondary" onclick="clearToken()">清除</button>
            </div>
        </div>

        <div class="buyable-banner" id="buyableBanner" style="display:none;"></div>
        <div class="summary-cards">
            <div class="summary-card">
                <div class="label">纳斯达克100</div>
                <div class="value" id="nasdaqCount">-</div>
                <div class="sub" id="nasdaqBuyable"></div>
            </div>
            <div class="summary-card">
                <div class="label">标普500</div>
                <div class="value" id="sp500Count">-</div>
                <div class="sub" id="sp500Buyable"></div>
            </div>
        </div>
        <input class="search-bar" id="searchInput" type="search" placeholder="搜索基金名称或代码..." oninput="filterFunds()">
        <div class="tab-bar">
            <div class="tab active" id="tabAll" onclick="switchTab('all')">全部</div>
            <div class="tab" id="tabNasdaq" onclick="switchTab('nasdaq')">纳斯达克</div>
            <div class="tab" id="tabSp500" onclick="switchTab('sp500')">标普500</div>
        </div>
        <div id="loading" class="loading-box"><div class="spinner"></div>正在加载基金数据...</div>
        <div id="fundList" class="fund-list" style="display:none;"></div>
    </div>

    <script>
        var GH_OWNER = 'skingdreamlove-hue';
        var GH_REPO = 'NDX-SPX';
        var GH_BRANCH = 'master';
        var GH_TOKEN = localStorage.getItem('github_token') || '';
        var allFunds = [];
        var currentTab = 'all';
        var searchText = '';

        function toast(msg, type) {
            var el = document.createElement('div');
            el.className = 'toast ' + type;
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(function() { el.remove(); }, 3000);
        }

        function updateModeBadge() {
            document.getElementById('modeBadge').textContent = GH_TOKEN ? 'Token已设置' : '自动更新';
            document.getElementById('modeBadge').className = 'mode-badge ' + (GH_TOKEN ? 'live' : 'static');
        }
        function toggleTokenInput() {
            var el = document.getElementById('tokenRow');
            el.style.display = el.style.display === 'none' ? 'flex' : 'none';
            document.getElementById('tokenInput').value = GH_TOKEN;
        }
        function saveToken() {
            var v = document.getElementById('tokenInput').value.trim();
            if (!v) { toast('请输入 Token', 'error'); return; }
            localStorage.setItem('github_token', v);
            GH_TOKEN = v;
            updateModeBadge();
            toast('Token 已保存到本地', 'success');
            document.getElementById('tokenRow').style.display = 'none';
        }
        function clearToken() {
            localStorage.removeItem('github_token');
            GH_TOKEN = '';
            updateModeBadge();
            toast('已清除 Token', 'info');
            document.getElementById('tokenRow').style.display = 'none';
        }

        function ghHeaders() {
            var h = { 'Accept': 'application/vnd.github+json' };
            if (GH_TOKEN) h['Authorization'] = 'Bearer ' + GH_TOKEN;
            return h;
        }

        function fetchWithToken(url) {
            return fetch(url, { headers: ghHeaders() });
        }

        // 从 raw.githubusercontent.com 读取数据（带 Token 绕过缓存）
        function fetchRawFile(path) {
            var url = 'https://raw.githubusercontent.com/' + GH_OWNER + '/' + GH_REPO + '/' + GH_BRANCH + '/' + path + '?t=' + Date.now();
            var opts = {};
            if (GH_TOKEN) opts.headers = { 'Authorization': 'Bearer ' + GH_TOKEN };
            return fetch(url, opts).then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });
        }

        // 触发 GHA workflow_dispatch
        function triggerGHA() {
            var url = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/actions/workflows/auto_update.yml/dispatches';
            return fetch(url, {
                method: 'POST',
                headers: ghHeaders(),
                body: JSON.stringify({ ref: GH_BRANCH })
            });
        }

        // 轮询等待 GHA 完成（超时 180 秒）
        function waitForGHA() {
            return new Promise(function(resolve, reject) {
                var url = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/actions/runs?event=workflow_dispatch&branch=' + GH_BRANCH + '&per_page=1';
                var start = Date.now();
                var knownRunId = null;
                var iv = setInterval(function() {
                    if (Date.now() - start > 180000) {
                        clearInterval(iv);
                        reject(new Error('超时'));
                        return;
                    }
                    fetchWithToken(url)
                        .then(function(r) { return r.json(); })
                        .then(function(data) {
                            var runs = data.workflow_runs || [];
                            if (runs.length === 0) return;
                            var run = runs[0];
                            if (!knownRunId) knownRunId = run.id;
                            // 只检查我们触发的这个 run
                            if (run.id === knownRunId) {
                                if (run.status === 'completed') {
                                    clearInterval(iv);
                                    if (run.conclusion === 'success') resolve();
                                    else reject(new Error('GHA 失败: ' + run.conclusion));
                                }
                            }
                        })
                        .catch(function() {});
                }, 5000);
            });
        }

        function parsePercent(str) { return parseFloat((str || '').replace('%', '')) || 0; }

        function getStatusInfo(statusText) {
            if (!statusText || statusText === 'N/A') return { text: '未知', cls: 'default', limit: null };
            var mainText = statusText;
            var limitVal = null;
            var m = statusText.match(/单日累计购买上限([\d.]+)(万?)元/);
            if (m) {
                var v = parseFloat(m[1]) || 0;
                if (m[2] === '万') v = v * 10000;
                limitVal = v;
                mainText = statusText.replace(m[0], '').trim();
            }
            var cls = 'default';
            if (mainText.indexOf('暂停申购') !== -1) cls = 'danger';
            else if (limitVal !== null) {
                if (limitVal < 100) cls = 'danger';
                else if (limitVal < 1000) cls = 'warning';
                else cls = 'success';
            } else if (mainText.indexOf('开放') !== -1 || mainText.indexOf('正常') !== -1) cls = 'success';
            else cls = 'info';
            return { text: mainText || '正常', cls: cls, limit: limitVal };
        }

        function formatLimit(limit) {
            if (limit === null) return '';
            if (limit >= 10000) return '上限' + (limit/10000).toFixed(1) + '万元';
            return '上限' + limit.toFixed(0) + '元';
        }

        function renderFunds() {
            var list = document.getElementById('fundList');
            list.innerHTML = '';
            var filtered = allFunds.filter(function(f) {
                if (currentTab === 'nasdaq' && f['分类'] !== 'nasdaq') return false;
                if (currentTab === 'sp500' && f['分类'] !== 'sp500') return false;
                if (searchText) {
                    var q = searchText.toLowerCase();
                    var name = (f['基金名称'] || '').toLowerCase();
                    var code = (f['基金代码'] || '');
                    if (name.indexOf(q) === -1 && code.indexOf(q) === -1) return false;
                }
                return true;
            });
            if (filtered.length === 0) {
                list.innerHTML = '<div class="no-data">没有匹配的基金</div>';
                return;
            }
            filtered.forEach(function(f) {
                var si = getStatusInfo(f['交易状态']);
                var y1 = f['近1年'] || '-';
                var netReturn = (parsePercent(f['近1年']) - parsePercent(f['合计费率'])).toFixed(2);
                var netCls = netReturn >= 0 ? 'pos' : 'neg';
                var card = document.createElement('div');
                card.className = 'fund-card';
                card.innerHTML =
                    '<div class="fund-header"><span class="fund-name">' + f['基金名称'] + '</span><span class="fund-code">' + f['基金代码'] + '</span></div>' +
                    '<div class="fund-body">' +
                        '<span class="status-badge ' + si.cls + '">' + si.text + '</span>' +
                        (si.limit !== null && si.text !== '暂停申购' ? '<span class="limit-tag" style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:' + (si.cls==='danger'?'rgba(239,68,68,0.15)':si.cls==='warning'?'rgba(245,158,11,0.15)':'rgba(16,185,129,0.15)') + ';">' + formatLimit(si.limit) + '</span>' : '') +
                        '<span class="type-pill ' + (f['类型'] === 'C' ? 'c' : 'a') + '">' + (f['类型'] || 'A') + '类</span>' +
                    '</div>' +
                    '<div class="fund-meta" style="margin-top:6px;">' +
                        '<span class="fund-meta-item">近1年: <span class="' + (parsePercent(y1) >= 0 ? 'pos' : 'neg') + '">' + y1 + '</span></span>' +
                        '<span class="fund-meta-item">费后收益: <span class="' + netCls + '">' + (netReturn >= 0 ? '+' : '') + netReturn + '%</span></span>' +
                        '<span class="fund-meta-item">费率: ' + (f['合计费率'] || '-') + '</span>' +
                    '</div>';
                card.addEventListener('click', function() { window.open(f['链接'], '_blank'); });
                list.appendChild(card);
            });
        }

        function filterFunds() { searchText = document.getElementById('searchInput').value; renderFunds(); }
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            renderFunds();
        }

        function updateBuyableDisplay() {
            var nasFunds = allFunds.filter(function(f) { return f['分类'] === 'nasdaq'; });
            var spFunds = allFunds.filter(function(f) { return f['分类'] === 'sp500'; });
            document.getElementById('nasdaqCount').textContent = nasFunds.length + ' 只';
            document.getElementById('sp500Count').textContent = spFunds.length + ' 只';
            function calcBuyable(list) {
                var total = 0;
                list.forEach(function(f) {
                    var s = f['交易状态'] || '';
                    if (s.indexOf('暂停申购') !== -1) return;
                    var m = s.match(/单日累计购买上限([\d.]+)(万?)元/);
                    if (m) {
                        var v = parseFloat(m[1]) || 0;
                        if (m[2] === '万') v = v * 10000;
                        total += v;
                    }
                });
                return total;
            }
            var nasBuyable = calcBuyable(nasFunds);
            var spBuyable = calcBuyable(spFunds);
            document.getElementById('nasdaqBuyable').textContent = '可买: ' + (nasBuyable >= 10000 ? (nasBuyable/10000).toFixed(2) + '万' : nasBuyable.toFixed(0)) + '元';
            document.getElementById('sp500Buyable').textContent = '可买: ' + (spBuyable >= 10000 ? (spBuyable/10000).toFixed(2) + '万' : spBuyable.toFixed(0)) + '元';
            var totalBuyable = nasBuyable + spBuyable;
            document.getElementById('buyableBanner').style.display = 'block';
            document.getElementById('buyableBanner').textContent = '合计可买入: ' + (totalBuyable >= 10000 ? (totalBuyable/10000).toFixed(2) + '万元' : totalBuyable.toFixed(0) + '元');
        }

        // 加载基金数据（默认从本地/GitHub Pages）
        function loadFundData() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('fundList').style.display = 'none';
            document.getElementById('updateTime').textContent = '正在加载...';

            fetch('real_fund_data.json?t=' + Date.now())
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    allFunds = data;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('fundList').style.display = 'flex';
                    renderFunds();
                    updateBuyableDisplay();
                    document.getElementById('updateTime').textContent = '数据来自 GHA 自动更新';
                })
                .catch(function() {
                    document.getElementById('loading').innerHTML = '加载失败，请刷新';
                });
        }

        // 从 GitHub raw 拉取最新数据（带 Token）
        function loadFundDataFromGitHub() {
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('fundList').style.display = 'none';
            document.getElementById('updateTime').textContent = '正在从 GitHub 获取...';

            return fetchRawFile('real_fund_data.json').then(function(data) {
                allFunds = data;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('fundList').style.display = 'flex';
                renderFunds();
                updateBuyableDisplay();
                document.getElementById('updateTime').textContent = '最新数据 | ' + new Date().toLocaleString();
            });
        }

        function handleUpdate() {
            var btn = document.getElementById('updateBtn');
            var t = document.getElementById('updateTime');

            if (!GH_TOKEN) {
                // 无 Token：重新加载本地文件
                t.textContent = '刷新本地数据...';
                toast('未设置 Token，仅刷新本地缓存', 'info');
                loadFundData();
                return;
            }

            // 有 Token：触发 GHA → 等待完成 → 取数据
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> 触发更新...';
            t.textContent = '正在触发 GitHub Actions...';
            t.style.color = '#F59E0B';

            triggerGHA().then(function(resp) {
                if (resp.status === 401 || resp.status === 403) {
                    throw new Error('Token 无效，请重新设置');
                }
                if (!resp.ok && resp.status !== 204) {
                    throw new Error('触发失败 (HTTP ' + resp.status + ')');
                }
                t.textContent = 'GHA 已触发，等待爬取完成...';
                toast('GHA 已触发，正在等待数据抓取...', 'info');
                return waitForGHA();
            })
            .then(function() {
                t.textContent = 'GHA 完成，正在获取最新数据...';
                t.style.color = '#10B981';
                return loadFundDataFromGitHub();
            })
            .then(function() {
                t.textContent = '实时更新成功 | ' + new Date().toLocaleString();
                t.style.color = '';
                showButtonDone(btn);
            })
            .catch(function(err) {
                t.textContent = '更新失败: ' + err.message;
                t.style.color = '#EF4444';
                showButtonDone(btn);
                // 降级到本地
                toast('实时更新失败，加载本地数据', 'error');
                loadFundData();
            });

            function showButtonDone(b) {
                b.disabled = false;
                b.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> 更新净值';
            }
        }

        updateModeBadge();
        window.onload = function() { loadFundData(); };
    </script>
</body>
</html>
