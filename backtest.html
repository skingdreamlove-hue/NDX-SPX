<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史回测 · 美股情绪监测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--ui-bg); color: var(--ui-text); line-height: 1.6; }
        :root {
            --ui-bg: #F9FAFB;
            --ui-text: #111827;
            --ui-card-bg: #fff;
            --ui-card-border: #E5E7EB;
            --ui-input-bg: #fff;
            --ui-input-border: #D1D5DB;
            --ui-input-text: #333;
            --ui-label: #555;
            --ui-muted: #6B7280;
            --ui-faint: #6B7280;
            --ui-accent: #4F46E5;
            --ui-accent-hover: #4338CA;
            --ui-addon-bg: #F3F4F6;
            --ui-addon-border: #D1D5DB;
            --ui-addon-unit-bg: #F9FAFB;
            --ui-progress-bg: #E5E7EB;
            --ui-placeholder-icon: #D1D5DB;
            --ui-placeholder-hint: #6B7280;
            --ui-error: #EF4444;
            --ui-success: #10B981;
            --bg:#0f1117;--bg2:#181c27;--bg3:#1e2335;
            --border:#2a3050;--border2:#3a4570;
            --text:#e8ecf4;--text2:#8892b0;--text3:#5a6580;
            --a:#4f9eff;--b:#f7c948;--green:#3dd68c;--red:#f05454;
            --ep:#f05454;--pa:#f7a548;--neu:#4f9eff;--gr:#3dd68c;--eg:#22c55e;
            --mono:'IBM Plex Mono',monospace;
            --r:8px;--r2:12px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --ui-bg: #0f1117;
                --ui-text: #e8ecf4;
                --ui-card-bg: #181c27;
                --ui-card-border: #2a3050;
                --ui-input-bg: #1e2335;
                --ui-input-border: #3a4570;
                --ui-input-text: #e8ecf4;
                --ui-label: #8892b0;
                --ui-muted: #8892b0;
                --ui-faint: #8892b0;
                --ui-accent: #6366F1;
                --ui-accent-hover: #4F46E5;
                --ui-addon-bg: #1e2335;
                --ui-addon-border: #3a4570;
                --ui-addon-unit-bg: #181c27;
                --ui-progress-bg: #2a3050;
                --ui-placeholder-icon: #3a4570;
                --ui-placeholder-hint: #8892b0;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        @keyframes page-fade-in { from { opacity: 0; } to { opacity: 1; } }
        body { animation: page-fade-in 0.3s ease; }
        .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; gap: 24px; }
        .header-left { display: flex; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header-title { font-size: 28px; font-weight: 800; color: var(--ui-text); margin: 0; }
        .header-badge { background: linear-gradient(135deg, #8B5CF6 0%, #A78BFA 100%); color: white; padding: 6px 14px; border-radius: 9999px; font-size: 13px; font-weight: 600; letter-spacing: 0.2px; display: inline-flex; align-items: center; gap: 6px; }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
        .switch-btn { background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%); color: white; border: none; padding: 10px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(37,99,235,0.25); text-decoration: none; display: inline-block; }
        .switch-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,99,235,0.35); }
        .main-content { max-width: 1280px; margin: 0 auto; padding: 0; }
        .input-area { display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
        .input-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .input-group label { font-size: 14px; color: var(--ui-label); white-space: nowrap; font-weight: 500; }
        .input-group input[type="date"] { background: var(--ui-input-bg); border: 1px solid var(--ui-input-border); color: var(--ui-input-text); padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .input-group input[type="date"]:focus { border-color: var(--ui-accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .field-error { width: 100%; color: var(--ui-error); font-size: 12px; display: none; }
        .field-error.visible { display: block; }
        .btn-start { background: var(--ui-accent); color: #fff; border: none; padding: 10px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s, box-shadow 0.2s; box-shadow: 0 2px 4px rgba(79,70,229,0.2); display: inline-flex; align-items: center; gap: 6px; }
        .btn-start:hover { background: var(--ui-accent-hover); box-shadow: 0 4px 8px rgba(79,70,229,0.3); }
        .btn-start:disabled { background: #C7D2FE; color: #fff; cursor: not-allowed; box-shadow: none; }
        .cashflow-card { background: var(--ui-card-bg); border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .cashflow-card .card-title { font-size: 15px; font-weight: 600; color: var(--ui-text); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--ui-card-border); display: flex; align-items: center; gap: 8px; }
        .cashflow-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .cashflow-item { display: flex; flex-direction: column; }
        .cashflow-item .input-addon { display: flex; align-items: center; background: var(--ui-addon-bg); border: 1px solid var(--ui-input-border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; flex: 1; }
        .cashflow-item .input-addon:focus-within { border-color: var(--ui-accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        .cashflow-item .input-addon .addon-label { padding: 8px 12px; font-size: 13px; color: var(--ui-muted); white-space: nowrap; background: var(--ui-addon-bg); border-right: 1px solid var(--ui-addon-border); font-weight: 500; }
        .cashflow-item .input-addon input[type="number"] { background: var(--ui-input-bg); border: none; color: var(--ui-input-text); padding: 8px 12px; font-size: 14px; outline: none; flex: 1; min-width: 0; -moz-appearance: textfield; }
        .cashflow-item .input-addon input[type="number"]::-webkit-inner-spin-button,
        .cashflow-item .input-addon input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .cashflow-item .input-addon .addon-unit { padding: 8px 12px; font-size: 12px; color: var(--ui-faint); white-space: nowrap; background: var(--ui-addon-unit-bg); border-left: 1px solid var(--ui-card-border); }
        .cashflow-field-error { color: var(--ui-error); font-size: 12px; margin-top: 4px; display: none; }
        .cashflow-field-error.visible { display: block; }
        .result-area { background: var(--ui-card-bg); border-radius: 12px; min-height: 400px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .result-area .placeholder { text-align: center; padding: 80px 0; }
        .result-area .placeholder .placeholder-icon { margin-bottom: 16px; color: var(--ui-placeholder-icon); }
        .result-area .placeholder .placeholder-text { font-size: 15px; color: var(--ui-faint); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .result-area .placeholder .placeholder-hint { font-size: 13px; color: var(--ui-placeholder-hint); }
        .loading { display: none; text-align: center; padding: 60px 0; }
        .loading.active { display: block; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--ui-progress-bg); border-top: 4px solid var(--ui-accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--ui-muted); font-size: 14px; }
        .progress-bar-wrap { display: none; margin-bottom: 20px; }
        .progress-bar-wrap.active { display: block; }
        .progress-bar-outer { background: var(--ui-progress-bg); border-radius: 4px; height: 8px; overflow: hidden; }
        .progress-bar-inner { background: var(--ui-accent); height: 100%; width: 0%; transition: width 0.3s; border-radius: 4px; }
        .progress-text { font-size: 12px; color: var(--ui-muted); margin-top: 4px; }

        .dashboard-wrap { display: none; background: var(--bg); border-radius: 12px; padding: 24px; }
        .dashboard-wrap.active { display: block; }
        .dash-sub { color: var(--text2); font-size: 13px; margin-bottom: 24px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 12px; margin-bottom: 24px; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; }
        .card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
        .card-val { font-size: 22px; font-weight: 600; font-family: var(--mono); color: var(--text); }
        .card-val.a { color: var(--a); }
        .card-val.b { color: var(--b); }
        .card-val.green { color: var(--green); }
        .card-delta { font-size: 12px; color: var(--text2); margin-top: 4px; }
        .section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2); padding: 20px; margin-bottom: 20px; }
        .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 16px; font-weight: 500; }
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; font-family: inherit; transition: .15s; }
        .tab.active { background: var(--bg3); border-color: var(--border2); color: var(--text); }
        .tab:hover:not(.active) { border-color: var(--border2); color: var(--text); }
        .chart-wrap { position: relative; width: 100%; height: 320px; }
        .legend { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
        .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
        .leg-dot { width: 10px; height: 10px; border-radius: 2px; }
        table.dash-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        table.dash-table th { text-align: left; color: var(--text3); font-weight: 500; font-size: 11px; letter-spacing: .6px; text-transform: uppercase; padding: 6px 10px; border-bottom: 1px solid var(--border); }
        table.dash-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 12px; color: var(--text); }
        table.dash-table tr:last-child td { border-bottom: none; }
        .pos { color: var(--green) !important; }
        .neg { color: var(--red) !important; }
        .yr-a { color: var(--a) !important; }
        .yr-b { color: var(--b) !important; }
        .emotion-bar { display: flex; height: 28px; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .emotion-seg { display: inline-block; height: 100%; }
        .emotion-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--text2); margin-top: 8px; }
        .emotion-legend span { display: flex; align-items: center; gap: 4px; }
        .emotion-legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
        .winner-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-family: inherit; font-weight: 500; vertical-align: middle; }
        .win-a { background: rgba(79,158,255,.15); color: var(--a); }
        .win-b { background: rgba(247,201,72,.15); color: var(--b); }
        .dash-note { font-size: 11px; color: var(--text3); margin-top: 12px; line-height: 1.5; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        .emo-stats-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .emo-stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 16px; }
        .emo-stat-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
        .emo-stat-detail { font-size: 12px; color: var(--text2); line-height: 1.8; }
        .kd-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 16px; margin-bottom: 8px; }
        .kd-date { font-weight: 600; color: var(--text); font-size: 14px; }
        .kd-detail { font-size: 12px; color: var(--text2); line-height: 1.8; }
        .ind-section { margin-top: 24px; }
        .ind-section .section-title { margin-bottom: 12px; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toast-in .3s ease; min-width: 200px; pointer-events: auto; }
        .toast-error { background: #EF4444; }
        .toast-success { background: #10B981; }
        .toast-info { background: #3B82F6; }
        @keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<div class="container">
    <div class="header">
        <div class="header-left">
            <h1 class="header-title">历史回测</h1>
            <span class="header-badge"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg> 回测分析</span>
        </div>
        <div class="header-right">
            <a href="index.html" class="switch-btn" aria-label="返回主页">返回主页</a>
        </div>
    </div>
<div class="main-content">
    <div class="input-area">
        <div class="input-group">
            <label for="start-date">开始时间</label>
            <input type="date" id="start-date" value="2016-01-01" min="2007-10-01" aria-label="开始时间">
            <div class="field-error" id="err-start-date"></div>
        </div>
        <div class="input-group">
            <label for="end-date">结束时间</label>
            <input type="date" id="end-date" value="" aria-label="结束时间">
            <div class="field-error" id="err-end-date"></div>
        </div>
        <button class="btn-start" id="btn-start" onclick="startBacktest()" aria-label="开始回测"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg> 开始回测</button>
    </div>
    <div class="cashflow-card">
        <div class="card-title"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> 实盘资金流设置 (Cashflow Settings)</div>
        <div class="cashflow-grid">
            <div class="cashflow-item">
                <div class="input-addon">
                    <span class="addon-label">初始总资产</span>
                    <input type="number" id="initial-capital" value="100000" min="1000" step="1000" aria-label="初始总资产">
                    <span class="addon-unit">元</span>
                </div>
                <div class="cashflow-field-error" id="err-initial-capital"></div>
            </div>
            <div class="cashflow-item">
                <div class="input-addon">
                    <span class="addon-label">初始仓位</span>
                    <input type="number" id="initial-position" value="40" min="0" max="100" step="1" aria-label="初始仓位">
                    <span class="addon-unit">%</span>
                </div>
                <div class="cashflow-field-error" id="err-initial-position"></div>
            </div>
            <div class="cashflow-item">
                <div class="input-addon">
                    <span class="addon-label">每日定投</span>
                    <input type="number" id="daily-sip" value="300" min="0" step="50" aria-label="每日定投">
                    <span class="addon-unit">元/日</span>
                </div>
                <div class="cashflow-field-error" id="err-daily-sip"></div>
            </div>
            <div class="cashflow-item">
                <div class="input-addon">
                    <span class="addon-label">闲钱年化</span>
                    <input type="number" id="cash-yield" value="2.0" min="0" max="10" step="0.1" aria-label="闲钱年化">
                    <span class="addon-unit">%</span>
                </div>
                <div class="cashflow-field-error" id="err-cash-yield"></div>
            </div>
            <div class="cashflow-item">
                <div class="input-addon">
                    <span class="addon-label">每日买入限额</span>
                    <input type="number" id="buy-cap" value="1500" min="100" step="100" aria-label="每日买入限额">
                    <span class="addon-unit">元/日</span>
                </div>
                <div class="cashflow-field-error" id="err-buy-cap"></div>
            </div>
        </div>
    </div>
    <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
        <div class="progress-text" id="progress-text">准备中...</div>
    </div>
    <div class="result-area" id="result-area">
        <div class="placeholder" id="placeholder">
            <div class="placeholder-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
            <div class="placeholder-text">请设置回测时间范围，点击「开始回测」运行</div>
            <div class="placeholder-hint">系统将模拟历史行情中的情绪判定与仓位调整策略</div>
        </div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loading-text">正在获取数据并运行回测，请稍候...</div>
        </div>
    </div>
    <div class="dashboard-wrap" id="dashboard-wrap"></div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let t=null;
const isElectron=!!window.electronAPI;
(function(){const e=document.getElementById('end-date');if(!e.value)e.value=new Date().toISOString().split('T')[0];})();

function showToast(msg,type){
    type=type||'info';
    var c=document.getElementById('toast-container');
    var el=document.createElement('div');
    el.className='toast toast-'+type;
    el.textContent=msg;
    c.appendChild(el);
    setTimeout(function(){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(function(){el.remove();},300);},3000);
}

function clearErrors(){
    document.querySelectorAll('.field-error,.cashflow-field-error').forEach(function(el){el.textContent='';el.classList.remove('visible');});
}

function showFieldError(id,msg){
    var el=document.getElementById(id);
    if(el){el.textContent=msg;el.classList.add('visible');}
}

async function startBacktest(){
    clearErrors();
    const s=document.getElementById('start-date').value,e=document.getElementById('end-date').value;
    var hasError=false;
    if(!s){showFieldError('err-start-date','请填写开始时间');hasError=true;}
    if(!e){showFieldError('err-end-date','请填写结束时间');hasError=true;}
    if(hasError)return;
    if(s<'2007-10-01'){showFieldError('err-start-date','开始时间不能早于2007年10月1日');return;}
    if(s>=e){showFieldError('err-end-date','开始必须早于结束');return;}
    const ic=parseFloat(document.getElementById('initial-capital').value)||100000,
          ip=parseFloat(document.getElementById('initial-position').value)||40,
          ms=parseFloat(document.getElementById('daily-sip').value)||0,
          cy=parseFloat(document.getElementById('cash-yield').value)||2.0,
          bc=parseFloat(document.getElementById('buy-cap').value)||1500;
    if(ic<1000){showFieldError('err-initial-capital','初始总资产不能低于1000元');return;}
    if(ip<0||ip>100){showFieldError('err-initial-position','初始仓位需在0-100%之间');return;}
    if(ms<0){showFieldError('err-daily-sip','每日定投不能为负');return;}
    if(cy<0||cy>10){showFieldError('err-cash-yield','闲钱年化需在0-10%之间');return;}
    if(bc<100){showFieldError('err-buy-cap','每日买入限额不能低于100元');return;}
    const b=document.getElementById('btn-start');
    b.disabled=true;
    document.getElementById('placeholder').style.display='none';
    document.getElementById('dashboard-wrap').classList.remove('active');
    const ld=document.getElementById('loading');
    ld.classList.add('active');
    const pw=document.getElementById('progress-wrap');
    pw.classList.add('active');
    document.getElementById('loading-text').textContent='正在获取数据...';
    const params={start_date:s,end_date:e,initial_capital:ic,initial_position:ip/100,daily_sip:ms,cash_yield:cy/100,buy_cap:bc};
    try{
        let r;
        if(isElectron){r=await window.electronAPI.startBacktest(s,e,params);}
        else{r=await(await fetch('/api/backtest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params)})).json();}
        if(r.status==='running')pollProgress(r.task_id);
        else if(r.status==='done')showResult(r.report);
        else throw new Error(r.message||'失败');
    }catch(err){
        ld.classList.remove('active');pw.classList.remove('active');
        const p=document.getElementById('placeholder');p.style.display='block';
        p.innerHTML='<div class="placeholder-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="placeholder-text"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> '+err.message+'</div>';
        b.disabled=false;
        showToast('回测失败: '+err.message,'error');
    }
}

function pollProgress(id){
    if(t)clearInterval(t);
    t=setInterval(async()=>{
        try{
            let d;
            if(isElectron){d=await window.electronAPI.backtestProgress(id);}
            else{d=await(await fetch('/api/backtest/progress?task_id='+id)).json();}
            document.getElementById('progress-bar').style.width=d.progress+'%';
            document.getElementById('progress-text').textContent=d.progress+'% - '+d.message;
            if(d.status==='done'){clearInterval(t);t=null;showResult(d.report);}
            else if(d.status==='error'){
                clearInterval(t);t=null;
                document.getElementById('loading').classList.remove('active');
                document.getElementById('progress-wrap').classList.remove('active');
                const p=document.getElementById('placeholder');p.style.display='block';
                p.innerHTML='<div class="placeholder-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="placeholder-text"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> '+d.message+'</div>';
                document.getElementById('btn-start').disabled=false;
                showToast('回测出错: '+d.message,'error');
            }
        }catch(e){clearInterval(t);t=null;}
    },1500);
}

const eColor={'极度恐慌':'#f05454','恐慌':'#f7a548','中性':'#4f9eff','贪婪':'#3dd68c','极度贪婪':'#22c55e'};
const fmtV=v=>v>=1e8?(v/1e8).toFixed(2)+'亿':v>=1e4?(v/1e4).toFixed(1)+'万':v.toFixed(0);
let growthChart=null,annualChart=null,posChart=null;

function showView(name,btn){
    document.querySelectorAll('.view-panel').forEach(el=>el.classList.remove('active'));
    document.getElementById('view-'+name).classList.add('active');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    if(name==='growth')initGrowth();
    else if(name==='annual')initAnnual();
    else if(name==='position')initPosition();
}

function showResult(report){

        document.getElementById('loading').classList.remove('active');
        document.getElementById('progress-wrap').classList.remove('active');
        document.getElementById('result-area').style.display='none';
        const dw=document.getElementById('dashboard-wrap');
        dw.classList.add('active');

        const p=report.performance||{};
        const nav_h=report.nav_history||[];
        const emo=report.emotion_statistics||{};
        const kd=report.key_dates||{};
        const ic=report.indicator_contribution||{};
        const yr=report.yearly_returns||{};
        const btAcc=report.backtest_accuracy||{};

        const totalInvested=p.total_invested||0;
        const finalA=p.final_benchmark_value||0;
        const finalB=p.final_strategy_value||0;
        const profitA=finalA-totalInvested;
        const profitB=finalB-totalInvested;
        const xirrA=p.benchmark_xirr!=null?(p.benchmark_xirr*100).toFixed(2):'N/A';
        const xirrB=p.strategy_xirr!=null?(p.strategy_xirr*100).toFixed(2):'N/A';
        const startDate=document.getElementById('start-date').value;
        const endDate=document.getElementById('end-date').value;
        const dailySip=parseFloat(document.getElementById('daily-sip').value)||0;

         let h='';
         h+='<p class="dash-sub">策略A（无脑定投） vs 策略B（情绪择时） · '+startDate+' — '+endDate+' · 初始'+fmtV(parseFloat(document.getElementById('initial-capital').value))+' + 日投'+fmtV(dailySip)+' · 闲钱年化'+(parseFloat(document.getElementById('cash-yield').value)||2).toFixed(1)+'%</p>';

        h+='<div class="cards" id="summary-cards"></div>';

        h+='<div class="tabs">';
        h+='<button class="tab active" onclick="showView(\'growth\',this)">资产走势</button>';
        h+='<button class="tab" onclick="showView(\'annual\',this)">逐年收益</button>';
        h+='<button class="tab" onclick="showView(\'position\',this)">仓位对比</button>';
        h+='<button class="tab" onclick="showView(\'signals\',this)">情绪信号</button>';
        h+='<button class="tab" onclick="showView(\'detail\',this)">数据明细</button>';
        h+='</div>';

        h+='<div id="view-growth" class="view-panel active section">';
        h+='<div class="section-title">组合总资产（月度）</div>';
        h+='<div class="legend">';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--a)"></span>策略A — 无脑定投</span>';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--b);border:1px dashed var(--b)"></span>策略B — 情绪择时</span>';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--text3)"></span>总投入成本</span>';
        h+='</div>';
        h+='<div class="chart-wrap"><canvas id="growthChart"></canvas></div>';
        h+='<p class="dash-note">* 纵轴为组合总资产（万元）。灰色虚线为累计投入本金（含每日定投）。</p>';
        h+='</div>';

        h+='<div id="view-annual" class="view-panel section">';
        h+='<div class="section-title">逐年收益率对比</div>';
        h+='<div class="legend">';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--a)"></span>策略A</span>';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--b)"></span>策略B</span>';
        h+='</div>';
        h+='<div class="chart-wrap" style="height:280px"><canvas id="annualChart"></canvas></div>';
        h+='<p class="dash-note">* 年度收益率含当年新增定投，非纯市场涨跌。</p>';
        h+='</div>';

        h+='<div id="view-position" class="view-panel section">';
        h+='<div class="section-title">股票仓位（% 总资产）</div>';
        h+='<div class="legend">';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--a)"></span>策略A 仓位</span>';
        h+='<span class="leg-item"><span class="leg-dot" style="background:var(--b)"></span>策略B 仓位</span>';
        h+='</div>';
        h+='<div class="chart-wrap"><canvas id="positionChart"></canvas></div>';
        h+='<p class="dash-note">* 策略A全部定投入股。策略B依情绪动态调仓。</p>';
        h+='</div>';

        h+='<div id="view-signals" class="view-panel section">';
        h+='<div class="section-title">策略B — 月度情绪信号时间轴</div>';
        h+='<div id="signal-bars"></div>';
        h+='<div class="emotion-legend">';
        h+='<span><i style="background:var(--ep)"></i>极度恐慌</span>';
        h+='<span><i style="background:var(--pa)"></i>恐慌</span>';
        h+='<span><i style="background:var(--neu)"></i>中性</span>';
        h+='<span><i style="background:var(--gr)"></i>贪婪</span>';
        h+='<span><i style="background:var(--eg)"></i>极度贪婪</span>';
        h+='</div>';
        h+='</div>';

        h+='<div id="view-detail" class="view-panel section">';
        h+='<div class="section-title">逐年数据明细</div>';
        h+='<table class="dash-table" id="detail-table"></table>';
        h+='<p class="dash-note" style="margin-top:16px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 回测结果仅供参考，不构成投资建议。历史表现不代表未来收益。</p>';
        h+='</div>';

        dw.innerHTML=h;

        buildSummary(finalA,finalB,totalInvested,profitA,profitB,xirrA,xirrB);
        buildDetailTable(yr,p);
        buildSignalBars(nav_h);
        storeReportData(nav_h,yr,p);

        growthChart=null;annualChart=null;posChart=null;
        setTimeout(()=>initGrowth(),100);
        document.getElementById('btn-start').disabled=false;
        showToast('回测完成','success');
    }catch(err){
        console.error('showResult error:',err);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('progress-wrap').classList.remove('active');
        const p=document.getElementById('placeholder');p.style.display='block';
        p.innerHTML='<div class="placeholder-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="placeholder-text">结果渲染失败: '+err.message+'</div>';
        document.getElementById('btn-start').disabled=false;
        showToast('结果渲染失败','error');
    }
}

function buildSummary(fA,fB,inv,pA,pB,xA,xB){
    const items=[
        {label:'策略A 期末资产',val:'¥'+fmtV(fA),cls:'a',delta:'绝对盈利 ¥'+fmtV(Math.max(0,pA))},
        {label:'策略A XIRR年化',val:xA+'%',cls:'a',delta:'内部收益率'},
        {label:'策略B 期末资产',val:'¥'+fmtV(fB),cls:'b',delta:'绝对盈利 ¥'+fmtV(Math.max(0,pB))},
        {label:'策略B XIRR年化',val:xB+'%',cls:'b',delta:'内部收益率'},
        {label:'合计投入本金',val:'¥'+fmtV(inv),cls:'',delta:'初始+日投累计'},
        {label:fA>=fB?'策略A领先':'策略B领先',val:'¥'+fmtV(Math.abs(fA-fB)),cls:'green',delta:'最终差额'},
    ];
    document.getElementById('summary-cards').innerHTML=items.map(i=>`
        <div class="card">
            <div class="card-label">${i.label}</div>
            <div class="card-val ${i.cls}">${i.val}</div>
            <div class="card-delta">${i.delta}</div>
        </div>`).join('');
}

function buildDetailTable(yr,p){
    let rows='';
    for(const[year,v]of Object.entries(yr)){
        const ra=(v.benchmark||0)*100, rb=(v.strategy||0)*100;
        const sNav=v.benchmark_nav_end!=null?'¥'+fmtV(v.benchmark_nav_end):'N/A';
        const bNav=v.strategy_nav_end!=null?'¥'+fmtV(v.strategy_nav_end):'N/A';
        const winsA=ra>rb, winsB=rb>ra;
        rows+='<tr>';
        rows+='<td style="color:var(--text2)">'+year+'</td>';
        rows+='<td class="yr-a">'+sNav+'</td>';
        rows+='<td class="'+(ra>=0?'pos':'neg')+'">'+(ra>=0?'+':'')+ra.toFixed(1)+'%'+(winsA?'<span class="winner-badge win-a">领先</span>':'')+'</td>';
        rows+='<td class="yr-b">'+bNav+'</td>';
        rows+='<td class="'+(rb>=0?'pos':'neg')+'">'+(rb>=0?'+':'')+rb.toFixed(1)+'%'+(winsB?'<span class="winner-badge win-b">领先</span>':'')+'</td>';
        rows+='</tr>';
    }
    const xirrA=p.benchmark_xirr!=null?(p.benchmark_xirr*100).toFixed(2):'N/A';
    const xirrB=p.strategy_xirr!=null?(p.strategy_xirr*100).toFixed(2):'N/A';
    document.getElementById('detail-table').innerHTML=`
        <thead><tr><th>年份</th><th>策略A年末</th><th>策略A收益</th><th>策略B年末</th><th>策略B收益</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr style="background:rgba(30,35,53,.5)">
            <td style="color:var(--text2);font-weight:500">最终</td>
            <td class="yr-a" style="font-weight:500">XIRR ${xirrA}%</td>
            <td></td>
            <td class="yr-b" style="font-weight:500">XIRR ${xirrB}%</td>
            <td></td>
        </tr></tfoot>`;
}

function buildSignalBars(navH){
    if(!navH||!navH.length){document.getElementById('signal-bars').innerHTML='<p class="dash-note">无情绪信号数据</p>';return;}
    const yearGroups={};
    navH.forEach(item=>{
        const yr=item.date.slice(0,4);
        if(!yearGroups[yr])yearGroups[yr]=[];
        yearGroups[yr].push(item);
    });
    let html='';
    Object.entries(yearGroups).forEach(([yr,items])=>{
        html+='<div style="margin-bottom:6px"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">'+yr+'</div><div class="emotion-bar">';
        items.forEach(m=>{
            const emo=m.emotion||'中性';
            html+='<span class="emotion-seg" style="width:'+100/items.length+'%;background:'+(eColor[emo]||'#888')+'" title="'+m.date+': '+emo+'"></span>';
        });
        html+='</div></div>';
    });
    document.getElementById('signal-bars').innerHTML=html;
}

let _reportData={};
function storeReportData(navH,yr,p){
    _reportData.navH=navH;
    _reportData.yr=yr;
    _reportData.p=p;
}

function initGrowth(){
    if(growthChart)return;
    const navH=_reportData.navH;
    if(!navH||!navH.length)return;
    const ctx=document.getElementById('growthChart');
    if(!ctx)return;
    const labels=navH.map(d=>d.date);
    const totalA=navH.map(d=>d.benchmark_nav||0);
    const totalB=navH.map(d=>d.strategy_nav||0);
    const ic=parseFloat(document.getElementById('initial-capital').value)||100000;
    const ms=parseFloat(document.getElementById('daily-sip').value)||0;
    const invested=navH.map(d=>{
        const dDate=new Date(d.date),startDate=new Date(labels[0]);
        const daysDiff=Math.floor((dDate-startDate)/(1000*60*60*24));
        return ic+ms*Math.max(0,daysDiff);
    });
    growthChart=new Chart(ctx,{
        type:'line',
        data:{
            labels:labels,
            datasets:[
                {label:'策略A',data:totalA,borderColor:'#4f9eff',backgroundColor:'rgba(79,158,255,.06)',borderWidth:2,pointRadius:0,fill:true,tension:.3},
                {label:'策略B',data:totalB,borderColor:'#f7c948',backgroundColor:'rgba(247,201,72,.04)',borderWidth:2,pointRadius:0,fill:true,tension:.3,borderDash:[4,2]},
                {label:'总投入',data:invested,borderColor:'#444',backgroundColor:'transparent',borderWidth:1,pointRadius:0,fill:false,tension:0,borderDash:[2,4]},
            ]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ¥${fmtV(ctx.parsed.y)}`}}},
            scales:{
                x:{ticks:{color:'#5a6580',maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{color:'rgba(42,48,80,.5)'}},
                y:{ticks:{color:'#5a6580',callback:v=>(v/1e4).toFixed(0)+'万'},grid:{color:'rgba(42,48,80,.5)'}}
            }
        }
    });
}

function initAnnual(){
    if(annualChart)return;
    const yr=_reportData.yr;
    if(!yr||!Object.keys(yr).length)return;
    const ctx=document.getElementById('annualChart');
    if(!ctx)return;
    const years=Object.keys(yr);
    const retA=years.map(y=>(yr[y].benchmark||0)*100);
    const retB=years.map(y=>(yr[y].strategy||0)*100);
    annualChart=new Chart(ctx,{
        type:'bar',
        data:{
            labels:years,
            datasets:[
                {label:'策略A',data:retA,backgroundColor:retA.map(v=>v>=0?'rgba(79,158,255,.75)':'rgba(240,84,84,.75)'),borderWidth:0},
                {label:'策略B',data:retB,backgroundColor:retB.map(v=>v>=0?'rgba(247,201,72,.75)':'rgba(240,84,84,.55)'),borderWidth:0},
            ]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y>0?'+':''}${ctx.parsed.y.toFixed(1)}%`}}},
            scales:{
                x:{ticks:{color:'#5a6580'},grid:{display:false}},
                y:{ticks:{color:'#5a6580',callback:v=>v+'%'},grid:{color:'rgba(42,48,80,.5)'},beginAtZero:false}
            }
        }
    });
}

function initPosition(){
    if(posChart)return;
    const navH=_reportData.navH;
    if(!navH||!navH.length||navH.length<2)return;
    const ctx=document.getElementById('positionChart');
    if(!ctx)return;
    const labels=navH.map(d=>d.date);
    const eqA=navH.map(d=>(d.bench_position!=null&&d.bench_position!==0)?d.bench_position*100:parseFloat(document.getElementById('initial-position').value)||40);
    const eqB=navH.map(d=>(d.strategy_position!=null&&d.strategy_position!==0)?d.strategy_position*100:parseFloat(document.getElementById('initial-position').value)||40);
    posChart=new Chart(ctx,{
        type:'line',
        data:{
            labels:labels,
            datasets:[
                {label:'策略A仓位',data:eqA,borderColor:'#4f9eff',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.3},
                {label:'策略B仓位',data:eqB,borderColor:'#f7c948',backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:.2,borderDash:[4,2]},
            ]
        },
        options:{
            responsive:true,maintainAspectRatio:false,
            interaction:{mode:'index',intersect:false},
            plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`}}},
            scales:{
                x:{ticks:{color:'#5a6580',maxRotation:0,autoSkip:true,maxTicksLimit:10},grid:{color:'rgba(42,48,80,.5)'}},
                y:{min:0,max:105,ticks:{color:'#5a6580',callback:v=>v+'%'},grid:{color:'rgba(42,48,80,.5)'}}
            }
        }
    });
}
</script>
